apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: vulpes
generatorOptions:
  disableNameSuffixHash: true
resources:
  - ../../../../../apps/base/vulpes-backend/
patches:
  - path: release.yaml

secretGenerator:
  - name: harbor-pull
    type: kubernetes.io/dockerconfigjson
    files:
      - .dockerconfigjson=harbor.onelitefeather.dev.dockerconfigjson.sops.json
  - name: vulpes-app-db
    envs:
      - vulpes.sops.env
