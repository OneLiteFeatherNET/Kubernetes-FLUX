apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: otis
  namespace: otis
spec:
  values:
    # HA prod: 2 replicas with seamless rollouts (surge +1, 0 unavailable),
    # spread across nodes, and a PDB so node drains never take the service down.
    # All native chart values now -- no postRenderer patches.
    replicaCount: 2
    priorityClassName: feather-standard
    strategy:
      type: RollingUpdate
      rollingUpdate:
        maxUnavailable: 0
        maxSurge: 1
    affinity:
      podAntiAffinity:
        preferredDuringSchedulingIgnoredDuringExecution:
          - weight: 100
            podAffinityTerm:
              topologyKey: kubernetes.io/hostname
              labelSelector:
                matchLabels:
                  app.kubernetes.io/instance: otis
                  app.kubernetes.io/name: micronaut
    podDisruptionBudget:
      enabled: true
      maxUnavailable: 1
    image:
      repository: harbor.onelitefeather.dev/onelitefeather/otis
      pullPolicy: IfNotPresent
      tag: "1.16.0"
    imagePullSecrets:
      - name: harbor-pull
    service:
      port: 8080
    metrics:
      enabled: true
      path: /prometheus
      serviceMonitor:
        enabled: true
    ingress:
      enabled: false
    httpRoute:
      enabled: true
      parentRefs:
        - name: eg
          namespace: envoy
          sectionName: https
      hostnames:
        - otis.apps.onelite.feather
      rules:
        - matches:
            - path:
                type: PathPrefix
                value: /
    # "k8s" activates the Micronaut Kubernetes environment so the discovery
    # client beans (micronaut-kubernetes-discovery-client) come up in-cluster.
    profiles: [ "prod", "k8s" ]

    # RBAC for in-namespace service discovery (read services/endpoints).
    rbac:
      create: true

    # Opt in to Alloy's JSON log pipeline (LOG_JSON=true emits structured logs).
    # Alloy maps this to the "format" stream label -> level/logger/timestamp parsing.
    podLabels:
      logs.onelitefeather.net/format: json
      logs.onelitefeather.net/env: prod

    # Traces only -- metrics/logs already covered by serviceMonitor scraping
    # and stdout shipping above.
    tracing:
      enabled: true

    # OTel bytecode instrumentation adds real seconds to JVM cold start,
    # which pushed first-successful-health past livenessProbe's deadline
    # and SIGTERM-looped the pod before it ever finished starting.
    startupProbe:
      enabled: true

    config:
      base: |-
        micronaut:
          application:
            name: Otis Backend
          server:
            port: 8080
            netty:
              access-logger:
                enabled: true
                # Drop probe/metrics noise: kubelet hits /health every 5-10s and
                # Prometheus scrapes /prometheus. Regexes match the request URI.
                exclusions:
                  - /health.*
                  - /prometheus.*
      profiles:
        prod: |-
          router:
            static-resources:
              swagger:
                paths: classpath:META-INF/swagger
                mapping: /swagger/**
              swagger-ui:
                paths: classpath:META-INF/swagger/views/swagger-ui
                mapping: /swagger-ui/**
          endpoints:
            health:
              enabled: true
              sensitive: false
            metrics:
              enabled: true
              sensitive: true
          micrometer:
            metrics:
              enabled: true
            export:
              prometheus:
                enabled: true
          logger:
            levels:
              root: WARN
              # Per-request access logs (micronaut.server.netty.access-logger).
              # root is WARN, so the access logger must be raised explicitly.
              HTTP_ACCESS_LOGGER: INFO
              "org.hibernate.SQL": WARN
              "org.hibernate.type.descriptor.sql": WARN
              "org.hibernate.orm.connections.pooling": WARN
              "com.zaxxer.hikari": WARN
          jpa:
            default:
              properties:
                hibernate:
                  hbm2ddl.auto: none
                  format_sql: false
                  show_sql: false
                  jdbc.lob.non_contextual_creation: true
                  connection.provider_disables_autocommit: true
                  jdbc.batch_size: 50
                  order_inserts: true
                  order_updates: true
                  jdbc.batch_versioned_data: true
          datasources:
            default:
              dialect: POSTGRES
              url: $${JDBC_URL}
              username: $${DB_USER}
              password: $${DB_PASS}
              driver-class-name: org.postgresql.Driver
              schema-generate: NONE
              maximumPoolSize: 20
              minimumIdle: 4
              autoCommit: false
              poolName: "HikariPool-Otis-Backend"
              connectionTimeout: 10000
              validationTimeout: 5000
              idleTimeout: 600000
              maxLifetime: 1700000
              keepaliveTime: 300000
              registerMbeans: true
              leakDetectionThreshold: 20000
              transactionIsolation: TRANSACTION_READ_COMMITTED
        # Loaded only in the Kubernetes (k8s) environment. k8s is listed in
        # profiles so the micronaut-kubernetes discovery beans activate (explicit
        # MICRONAUT_ENVIRONMENTS disables auto-deduction). The chart requires one
        # config file per profile, so this file must exist.
        k8s: |-
          # Disable the KubernetesHealthIndicator: the client-java bundled with
          # micronaut-kubernetes 7.1.1 can't deserialize newer API-server pod
          # fields (observedGeneration / PodReadyToStartContainers), so every
          # /health probe logs an ERROR+WARN. Service discovery is unaffected.
          endpoints:
            health:
              kubernetes:
                enabled: false
          kubernetes:
            client:
              discovery:
                mode: endpoint
    envFrom:
      - secretRef:
          name: otis-app-db
    env:
      - name: LOG_JSON
        value: "true"
    readinessProbe:
      path: /health
      initialDelaySeconds: 5
      periodSeconds: 5
    livenessProbe:
      path: /health
      initialDelaySeconds: 15
      periodSeconds: 10
