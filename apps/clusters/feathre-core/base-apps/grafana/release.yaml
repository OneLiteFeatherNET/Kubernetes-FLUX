                    model:
                      editorMode: code
                      expr: sum(cnpg_backends_total{namespace="cnpg-system"}) / scalar(max(cnpg_pg_settings_setting{namespace="cnpg-system", name="max_connections"})) * 100
                      instant: true
                      intervalMs: 1000
                      maxDataPoints: 43200
                      range: false
                      refId: A
                  - refId: B
                    relativeTimeRange:
                      from: 600
                      to: 0
                    datasourceUid: '-100'
                    model:
