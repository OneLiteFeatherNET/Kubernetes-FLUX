apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: grafana
  namespace: grafana
spec:
  postRenderers:
    - kustomize:
        patches:
          - target:
              kind: Deployment
              name: grafana
            patch: |
              - op: add
                path: /spec/template/spec/priorityClassName
                value: feather-high
  valuesFrom:
    - kind: Secret
      name: grafana-admin
      valuesKey: adminUser
      targetPath: adminUser
    - kind: Secret
      name: grafana-admin
      valuesKey: adminPassword
      targetPath: adminPassword
  values:
    podLabels:
      logs.onelitefeather.net/env: prod
    replicas: 2
    headlessService: true
    useStatefulSet: false
    serviceMonitor:
      enabled: true
    podDisruptionBudget:
      minAvailable: 1
    affinity:
      nodeAffinity:
        preferredDuringSchedulingIgnoredDuringExecution:
          - weight: 100
            preference:
              matchExpressions:
                - key: topology.kubernetes.io/region
                  operator: In
                  values:
                    - fr-rosenau
    topologySpreadConstraints:
      - maxSkew: 1
        topologyKey: kubernetes.io/hostname
        whenUnsatisfiable: DoNotSchedule
        labelSelector:
          matchLabels:
            app.kubernetes.io/name: grafana
            app.kubernetes.io/instance: grafana
    persistence:
      enabled: false
    ingress:
      enabled: false
    env:
      GF_DATABASE_TYPE: postgres
      GF_DATABASE_HOST: feather-core-cluster-pg-pooler-rw.cnpg-system.svc.cluster.local:5432
      GF_DATABASE_NAME: grafana
      GF_DATABASE_SSL_MODE: disable
    envValueFrom:
      POD_IP:
        fieldRef:
          apiVersion: v1
          fieldPath: status.podIP
      GF_DATABASE_USER:
        secretKeyRef:
          name: grafana-postgresql
          key: username
      GF_DATABASE_PASSWORD:
        secretKeyRef:
          name: grafana-postgresql
          key: password
    grafana.ini:
      server:
        domain: grafana.apps.onelite.feather
        root_url: https://grafana.apps.onelite.feather
      unified_alerting:
        enabled: true
        ha_peers: grafana-headless:9094
        ha_listen_address: ${POD_IP}:9094
        ha_advertise_address: ${POD_IP}:9094
        rule_version_record_limit: "5"
      alerting:
        enabled: false
    datasources:
      datasources.yaml:
        apiVersion: 1
        datasources:
          - name: Mimir
            uid: mimir
            type: prometheus
            access: proxy
            url: http://mimir-gateway.grafana.svc.cluster.local/prometheus
            isDefault: true
            editable: false
            jsonData:
              httpMethod: POST
              timeInterval: 30s
          - name: Loki
            uid: loki
            type: loki
            access: proxy
            url: http://loki-gateway.grafana.svc.cluster.local
            editable: false
            jsonData:
              maxLines: 1000
              derivedFields:
                - datasourceUid: tempo
                  matcherRegex: '"trace_id":"(\w+)"'
                  name: TraceID
                  url: "$${__value.raw}"
          - name: Tempo
            uid: tempo
            type: tempo
            access: proxy
            url: http://tempo-gateway.grafana.svc.cluster.local
            editable: false
            jsonData:
              tracesToLogsV2:
                datasourceUid: loki
                spanStartTimeShift: "-1h"
                spanEndTimeShift: "1h"
                filterByTraceID: false
                filterBySpanID: false
              tracesToMetrics:
                datasourceUid: mimir
                spanStartTimeShift: "-1h"
                spanEndTimeShift: "1h"
              serviceMap:
                datasourceUid: mimir
              nodeGraph:
                enabled: true
    dashboardProviders:
      dashboardproviders.yaml:
        apiVersion: 1
        providers:
          - name: kubernetes
            orgId: 1
            folder: Kubernetes
            type: file
            disableDeletion: false
            editable: true
            options:
              path: /var/lib/grafana/dashboards/kubernetes
          - name: controllers
            orgId: 1
            folder: Controllers
            type: file
            disableDeletion: false
            editable: true
            options:
              path: /var/lib/grafana/dashboards/controllers
          - name: observability
            orgId: 1
            folder: Observability
            type: file
            disableDeletion: false
            editable: true
            options:
              path: /var/lib/grafana/dashboards/observability
          - name: databases
            orgId: 1
            folder: Databases
            type: file
            disableDeletion: false
            editable: true
            options:
              path: /var/lib/grafana/dashboards/databases
          - name: applications
            orgId: 1
            folder: Applications
            type: file
            disableDeletion: false
            editable: true
            options:
              path: /var/lib/grafana/dashboards/applications
          - name: storage
            orgId: 1
            folder: Storage
            type: file
            disableDeletion: false
            editable: true
            options:
              path: /var/lib/grafana/dashboards/storage
          - name: minecraft
            orgId: 1
            folder: Minecraft
            type: file
            disableDeletion: false
            editable: true
            options:
              path: /var/lib/grafana/dashboards/minecraft
