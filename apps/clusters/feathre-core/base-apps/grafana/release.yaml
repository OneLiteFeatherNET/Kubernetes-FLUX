                              "color": "red",
                              "index": 0,
                              "text": "Down"
                            },
                            "1": {
                              "color": "green",
                              "index": 1,
                              "text": "Up"
                            }
                          },
                          "type": "value"
                        }
                      ],
                      "thresholds": {
                        "mode": "absolute",
                        "steps": [
