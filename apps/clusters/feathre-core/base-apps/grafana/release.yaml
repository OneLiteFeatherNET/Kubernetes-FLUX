          - orgId: 1
            name: backups
            folder: Backups
            interval: 60s
            rules:
              - uid: cnpg-backup-stale
                title: CNPG backup stale
                condition: B
                data:
                  - refId: A
                    relativeTimeRange:
                      from: 600
                      to: 0
                    datasourceUid: mimir
                    model:
                      editorMode: code
                      # cnpg_collector_last_available_backup_timestamp never updates for
                      # plugin-based (barman-cloud) backups -- confirmed live it stays
                      # stuck at 0 even after real completed backups. cnpg_backup_stopped_at_seconds
                      # (kube-state-metrics customResourceState reading the Backup CR itself)
                      # is the metric that actually reflects reality.
                      expr: (time() - max(cnpg_backup_stopped_at_seconds{cluster="feather-core-cluster-pg", phase="completed"})) / 3600
                      instant: true
                      intervalMs: 1000
                      maxDataPoints: 43200
                      range: false
                      refId: A
                  - refId: B
                    relativeTimeRange:
                      from: 600
                      to: 0
                    datasourceUid: '-100'
                    model:
                      conditions:
                        - evaluator:
                            params:
                              - 24
                            type: gt
                          operator:
                            type: and
                          query:
                            params:
                              - B
                          reducer:
                            params: []
                            type: last
                          type: query
                      datasource:
                        type: __expr__
                        uid: '-100'
                      expression: A
                      intervalMs: 1000
                      maxDataPoints: 43200
                      refId: B
                      type: threshold
                noDataState: OK
                execErrState: Alerting
                for: 5m
                annotations:
                  summary: "No successful CloudNativePG (Postgres) backup in over 24h."
                  dashboard_url: "https://grafana.apps.onelite.feather/d/cloudnative-pg"
                labels:
                  severity: warning
              - uid: cnpg-backup-failing
                title: CNPG backup failing
                condition: B
                data:
                  - refId: A
                    relativeTimeRange:
                      from: 600
                      to: 0
                    datasourceUid: mimir
                    model:
                      editorMode: code
                      # Same dead-metric issue as cnpg-backup-stale: the legacy
                      # cnpg_collector_last_failed_backup_timestamp metric never fires
                      # for plugin-based backups. Failed backups never get a stoppedAt
                      # (only completed ones do), so use createdAt instead: any Backup
                      # CR that entered phase=failed within the staleness window (24h).
                      expr: count(cnpg_backup_created_at_seconds{cluster="feather-core-cluster-pg", phase="failed"} > (time() - 86400)) OR vector(0)
                      instant: true
                      intervalMs: 1000
                      maxDataPoints: 43200
                      range: false
                      refId: A
                  - refId: B
                    relativeTimeRange:
                      from: 600
                      to: 0
                    datasourceUid: '-100'
