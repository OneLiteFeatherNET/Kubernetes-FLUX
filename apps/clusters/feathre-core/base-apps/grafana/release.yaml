                            params:
                              - 0
                            type: gt
                          operator:
                            type: and
                          query:
                            params:
                              - B
                          reducer:
                            params: []
                            type: last
                          type: query
                      datasource:
                        type: __expr__
                        uid: '-100'
                      expression: A
                      intervalMs: 1000
                      maxDataPoints: 43200
                      refId: B
                      type: threshold
                noDataState: Alerting
                execErrState: Alerting
                for: 5m
                annotations:
                  summary: "One or more pods have been stuck in Terminating for over 15 minutes. Matches the containerd shim task.Delete hang on SIGKILL teardown seen before. Check: kubectl get pods -A --field-selector=status.phase!=Running | grep Terminating"
                labels:
                  severity: warning
          - orgId: 1
            name: observability
            folder: Observability
            interval: 60s
            rules:
              - uid: observability-pipeline-no-data
                title: Observability pipeline producing no data
                condition: B
                data:
                  - refId: A
                    relativeTimeRange:
                      from: 600
                      to: 0
                    datasourceUid: mimir
                    model:
                      editorMode: code
                      # count() returns a real value (currently 10, one per kubelet target) when
                      # the pipeline is healthy - evaluated normally against the threshold below,
                      # not firing. If every kubelet target vanishes from Mimir (the whole Alloy
                      # remote-write pipeline going dark), this query returns NO series, which
                      # triggers Grafana's NoData path -> noDataState: Alerting -> fires. Do NOT
                      # use absent() here: it returns empty exactly when healthy (the opposite of
                      # what noDataState: Alerting needs), which was a real bug (empty result +
                      # noDataState: Alerting fired immediately on a healthy cluster).
                      expr: count(up{job="kubelet", metrics_path="/metrics"})
                      instant: true
                      intervalMs: 1000
                      maxDataPoints: 43200
                      range: false
                      refId: A
                  - refId: B
                    relativeTimeRange:
                      from: 600
                      to: 0
                    datasourceUid: '-100'
                    model:
                      conditions:
                        - evaluator:
                            params:
                              - 1
                            type: lt
                          operator:
                            type: and
                          query:
                            params:
                              - B
                          reducer:
                            params: []
                            type: last
                          type: query
                      datasource:
                        type: __expr__
                        uid: '-100'
                      expression: A
                      intervalMs: 1000
                      maxDataPoints: 43200
                      refId: B
                      type: threshold
                noDataState: Alerting
                execErrState: Alerting
                for: 5m
                annotations:
                  summary: "No kubelet metrics are reaching Mimir at all - the Alloy scrape/remote-write pipeline is likely down. Every other alert in this cluster depends on this pipeline and will read as falsely healthy while this fires. Check: kubectl -n grafana get pods -l app.kubernetes.io/name=alloy-metrics"
                labels:
                  severity: critical
    resources:
      requests:
        cpu: 250m
        memory: 512Mi
      limits:
        cpu: 2
        memory: 2Gi
