    alerting:
      contactpoints.yaml:
        secret:
          apiVersion: 1
          contactPoints:
            - orgId: 1
              name: discord
              receivers:
                - uid: discord_webhook
                  type: discord
                  settings:
                    url: "placeholder-overwritten-by-valuesFrom"
                    use_discord_username: true
                    title: '{{ `{{ template "discord.title" . }}` }}'
                    message: '{{ `{{ template "discord.message" . }}` }}'
      templates.yaml:
        apiVersion: 1
        templates:
          - name: discord.title
            template: '{{ `{{ define "discord.title" }}` }}{{ `{{ if eq .Status "firing" }}` }}🔴 FIRING{{ `{{ else }}` }}✅ RESOLVED{{ `{{ end }}` }} · {{ `{{ .CommonLabels.alertname }}` }}{{ `{{ end }}` }}'
          - name: discord.message
            template: |
              {{ `{{ define "discord.message" }}` }}
              {{ `{{- range .Alerts }}` }}
              {{ `{{ .Annotations.summary }}` }}
              {{ `{{- if .Labels.severity }}` }}
              severity: `{{ `{{ .Labels.severity }}` }}`
              {{ `{{- end }}` }}
              🔗 Rule: <{{ `{{ .GeneratorURL }}` }}>
              {{ `{{- if .Annotations.dashboard_url }}` }}
              📊 Dashboard: <{{ `{{ .Annotations.dashboard_url }}` }}>
              {{ `{{- end }}` }}

              {{ `{{ end }}` }}
              {{ `{{- end }}` }}
