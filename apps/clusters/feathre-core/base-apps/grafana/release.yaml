apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: grafana
  namespace: grafana
spec:
  valuesFrom:
    - kind: Secret
      name: grafana-admin
      valuesKey: adminUser
      targetPath: adminUser
    - kind: Secret
      name: grafana-admin
      valuesKey: adminPassword
      targetPath: adminPassword
  values:
    replicas: 2
    headlessService: true
    useStatefulSet: false
    serviceMonitor:
      enabled: true
    podDisruptionBudget:
      minAvailable: 1
    topologySpreadConstraints:
      - maxSkew: 1
        topologyKey: kubernetes.io/hostname
        whenUnsatisfiable: DoNotSchedule
        labelSelector:
          matchLabels:
            app.kubernetes.io/name: grafana
            app.kubernetes.io/instance: grafana
    persistence:
      enabled: false
    ingress:
      enabled: true
      ingressClassName: nginx
      annotations:
        cert-manager.io/cluster-issuer: step-ca
      hosts:
        - grafana.apps.onelite.feather
      tls:
        - secretName: grafana-apps-onelite-feather-tls
          hosts:
            - grafana.apps.onelite.feather
    env:
      GF_DATABASE_TYPE: postgres
      GF_DATABASE_HOST: feather-core-cluster-pg-pooler-rw.cnpg-system.svc.cluster.local:5432
      GF_DATABASE_NAME: grafana
      GF_DATABASE_SSL_MODE: disable
    envValueFrom:
      POD_IP:
        fieldRef:
          apiVersion: v1
          fieldPath: status.podIP
      GF_DATABASE_USER:
        secretKeyRef:
          name: grafana-postgresql
          key: username
      GF_DATABASE_PASSWORD:
        secretKeyRef:
          name: grafana-postgresql
          key: password
    grafana.ini:
      server:
        domain: grafana.apps.onelite.feather
        root_url: https://grafana.apps.onelite.feather
      unified_alerting:
        enabled: true
        ha_peers: grafana-headless:9094
        ha_listen_address: ${POD_IP}:9094
        ha_advertise_address: ${POD_IP}:9094
        rule_version_record_limit: "5"
      alerting:
        enabled: false
    datasources:
      datasources.yaml:
        apiVersion: 1
        datasources:
          - name: Mimir
            uid: mimir
            type: prometheus
            access: proxy
            url: http://mimir-gateway.grafana.svc.cluster.local/prometheus
            isDefault: true
            editable: false
            jsonData:
              httpMethod: POST
              timeInterval: 30s
          - name: Loki
            uid: loki
            type: loki
            access: proxy
            url: http://loki-gateway.grafana.svc.cluster.local
            editable: false
            jsonData:
              maxLines: 1000
    dashboardProviders:
      dashboardproviders.yaml:
        apiVersion: 1
        providers:
          - name: kubernetes
            orgId: 1
            folder: Kubernetes
            type: file
            disableDeletion: false
            editable: true
            options:
              path: /var/lib/grafana/dashboards/kubernetes
          - name: controllers
            orgId: 1
            folder: Controllers
            type: file
            disableDeletion: false
            editable: true
            options:
              path: /var/lib/grafana/dashboards/controllers
          - name: observability
            orgId: 1
            folder: Observability
            type: file
            disableDeletion: false
            editable: true
            options:
              path: /var/lib/grafana/dashboards/observability
          - name: databases
            orgId: 1
            folder: Databases
            type: file
            disableDeletion: false
            editable: true
            options:
              path: /var/lib/grafana/dashboards/databases
          - name: applications
            orgId: 1
            folder: Applications
            type: file
            disableDeletion: false
            editable: true
            options:
              path: /var/lib/grafana/dashboards/applications
    dashboards:
      kubernetes:
        kubernetes-dashboard:
          gnetId: 22523
          revision: 2
          datasource: Mimir
        kubernetes-cluster:
          gnetId: 7249
          revision: 1
          datasource: Mimir
        kube-state-metrics:
          gnetId: 21742
          revision: 1
          datasource: Mimir
        persistent-volumes:
          gnetId: 15600
          revision: 1
          datasource: Mimir
        node-exporter-full:
          gnetId: 1860
          revision: 41
          datasource: Mimir
      controllers:
        ingress-nginx:
          gnetId: 9614
          revision: 1
          datasource: Mimir
        cert-manager:
          gnetId: 20340
          revision: 1
          datasource: Mimir
        flux-cluster-stats:
          url: https://raw.githubusercontent.com/fluxcd/flux2-monitoring-example/main/monitoring/configs/dashboards/cluster.json
          datasource: Mimir
        flux-control-plane:
          url: https://raw.githubusercontent.com/fluxcd/flux2-monitoring-example/main/monitoring/configs/dashboards/control-plane.json
          datasource: Mimir
      observability:
        prometheus-overview:
          gnetId: 3662
          revision: 2
          datasource: Mimir
        loki-metrics:
          gnetId: 17781
          revision: 1
          datasource: Mimir
        loki-quick-search:
          gnetId: 12019
          revision: 2
          datasource:
            - name: DS_PROMETHEUS
              value: Mimir
            - name: DS_LOKI
              value: Loki
      databases:
        cloudnative-pg:
          url: https://raw.githubusercontent.com/cloudnative-pg/grafana-dashboards/refs/heads/main/charts/cluster/grafana-dashboard.json
          datasource: Mimir
        mariadb-galera:
          gnetId: 13106
          revision: 1
          datasource: Mimir
        redis-exporter:
          gnetId: 14091
          revision: 1
          datasource: Mimir
      applications:
        harbor:
