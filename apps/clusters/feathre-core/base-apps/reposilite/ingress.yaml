apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: reposilite-cloudflare-tunnel
  annotations:
    # reposilite serves plain HTTP on 8080
    cloudflare-tunnel-ingress-controller.strrl.dev/backend-protocol: http
spec:
  ingressClassName: cloudflare-tunnel
  rules:
    # Primary host — served through the Cloudflare Tunnel. The controller
    # takes over the existing CNAME and flips it to proxied automatically.
    - host: repo.onelitefeather.dev
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: reposilite
                port:
                  number: 8080
