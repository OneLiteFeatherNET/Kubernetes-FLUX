apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: reposilite
generatorOptions:
  disableNameSuffixHash: true
resources:
  - ../../../../../apps/base/reposilite/
  - httproute.yaml
patches:
  - path: release.yaml

secretGenerator:
  - name: reposilite-secrets
    envs:
      - reposilite.sops.env
