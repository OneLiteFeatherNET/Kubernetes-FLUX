apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: harbor-core
  namespace: harbor
spec:
  maxUnavailable: 1
  selector:
    matchLabels:
      app: harbor
      component: core
      release: harbor
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: harbor-registry
  namespace: harbor
spec:
  maxUnavailable: 1
  selector:
    matchLabels:
      app: harbor
      component: registry
      release: harbor
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: harbor-jobservice
  namespace: harbor
spec:
  maxUnavailable: 1
  selector:
    matchLabels:
      app: harbor
      component: jobservice
      release: harbor
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: harbor-portal
  namespace: harbor
spec:
  maxUnavailable: 1
  selector:
    matchLabels:
      app: harbor
      component: portal
      release: harbor
---
# nginx is the single front service all Harbor traffic funnels through; keep at
# least one pod up across voluntary disruptions (node drains) to avoid 504s.
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: harbor-nginx
  namespace: harbor
spec:
  maxUnavailable: 1
  selector:
    matchLabels:
      app: harbor
      component: nginx
      release: harbor
