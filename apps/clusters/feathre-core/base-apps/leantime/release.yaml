apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: leantime
  namespace: leantime
spec:
  values:
    priorityClassName: feather-standard
    resources:
      limits:
        cpu: 2
        memory: 2Gi
      requests:
        cpu: 1
        memory: 1Gi
    securityContext:
      readOnlyRootFilesystem: false
      runAsUser: 1000
    envFrom:
      - secretRef:
          name: leantime-env

    replicaCount: 1
    ingress:
      enabled: false
    httpRoute:
      enabled: true
      parentRefs:
        - name: eg
          namespace: envoy
          sectionName: https
      hostnames:
        - leantime.onelitefeather.net
      rules:
        - matches:
            - path:
                type: PathPrefix
                value: /

