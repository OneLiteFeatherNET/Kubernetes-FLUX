apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: leantime
  namespace: leantime
spec:
  postRenderers:
    - kustomize:
        patches:
          - target:
              kind: Deployment
              name: leantime
            patch: |
              - op: add
                path: /spec/template/spec/priorityClassName
                value: feather-standard
  values:
    resources:
      limits:
        cpu: 2
        memory: 2Gi
      requests:
        cpu: 1
        memory: 1Gi
    securityContext:
      readOnlyRootFilesystem: false
      runAsUser: 1000
    envFrom:
      - secretRef:
          name: leantime-env

    replicaCount: 1
    ingress:
      enabled: false
    # Exposed via Cloudflare Tunnel (see ingress.yaml); chart HTTPRoute off.
    httpRoute:
      enabled: false

