apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: leantime-cloudflare-tunnel
  annotations:
    cloudflare-tunnel-ingress-controller.strrl.dev/backend-protocol: http
spec:
  ingressClassName: cloudflare-tunnel
  rules:
    - host: leantime.onelitefeather.net
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: leantime
                port:
                  number: 8080
