apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: outline-cloudflare-tunnel
  annotations:
    cloudflare-tunnel-ingress-controller.strrl.dev/backend-protocol: http
spec:
  ingressClassName: cloudflare-tunnel
  rules:
    - host: outline.onelitefeather.dev
      http:
        paths:
          # socket.io realtime presence/notifications
          - path: /realtime
            pathType: Prefix
            backend:
              service:
                name: outline-websockets
                port:
                  number: 3000
          # Hocuspocus realtime collaborative editing
          - path: /collaboration
            pathType: Prefix
            backend:
              service:
                name: outline-collaboration
                port:
                  number: 3000
          # App, API, auth, static — everything else
          - path: /
            pathType: Prefix
            backend:
              service:
                name: outline-web
                port:
                  number: 3000
