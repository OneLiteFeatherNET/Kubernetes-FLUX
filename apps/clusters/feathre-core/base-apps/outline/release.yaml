apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: outline
  namespace: outline
spec:
  values:
    image:
      repository: docker.getoutline.com/outlinewiki/outline
      # This sets the pull policy for images.
      pullPolicy: IfNotPresent
      # Overrides the image tag whose default is the chart appVersion.
      tag: "1.8.1"
    # Applied to every component pod (replaces the former post-render patch).
    priorityClassName: feather-standard
    # One Node process per pod — we scale horizontally via replicas, not via
    # in-pod throng forks. Overrides WEB_CONCURRENCY from the .env secret and
    # keeps per-component memory ~4x lower (the secret sets WEB_CONCURRENCY=4).
    extraEnv:
      - name: WEB_CONCURRENCY
        value: "1"
      # Postgres max_connections is 100 cluster-wide. With ~9 component pods a
      # MIN=5/MAX=10 pool (from the .env) exhausts it. Keep a small pool per pod
      # (9 pods x 3 = 27 max). The CNPG pooler is session-mode, so it would not
      # multiplex these away.
      - name: DATABASE_CONNECTION_POOL_MIN
        value: "1"
      - name: DATABASE_CONNECTION_POOL_MAX
        value: "3"
    securityContext:
      readOnlyRootFilesystem: false
      runAsUser: 1000
    volumeMounts:
      - mountPath: /opt/outline/.env
        name: outline-env-file
        readOnly: true
        subPath: .env
    volumes:
      - name: outline-env-file
        secret:
          items:
            - key: .env
              path: .env
          secretName: outline-env

    ingress:
      enabled: false
    # Exposed via Cloudflare Tunnel (see ingress.yaml); chart HTTPRoute off.
    httpRoute:
      enabled: false

    # Outline services run as stateless Deployments. Only the HTTP/realtime
    # surface (web, websockets) and the BullMQ services (worker, cron) are run
    # together in the web component: websockets has no WEBSOCKETS_URL, and an
    # isolated worker/cron grows memory unbounded (BullMQ leak when run alone),
    # whereas the proven all-in-one process model is stable. cron duplication
    # across the 2 web replicas is safe (BullMQ repeatable jobs are idempotent).
    # collaboration has its own URL/path and runs separately for independent
    # scaling. The Cloudflare Tunnel Ingress (ingress.yaml) routes:
    #   /collaboration -> outline-collaboration
    #   /              -> outline-web (app, API, /realtime, worker, cron)
    # Multi-replica collaboration requires REDIS_COLLABORATION_URL in outline-env.
    components:
      web:
        enabled: true
        services: "web,websockets,worker,cron"
        http: true
        service: true
        replicaCount: 2
        resources:
          limits:
            cpu: 2
            memory: 3Gi
          requests:
            cpu: 1
            memory: 1500Mi
        livenessProbe:
          initialDelaySeconds: 60
          httpGet:
            path: /_health
            port: http
        readinessProbe:
          initialDelaySeconds: 60
          httpGet:
            path: /_health
            port: http
        pdb:
          enabled: true
          minAvailable: 1
        affinity: &regionAffinity
          nodeAffinity:
            preferredDuringSchedulingIgnoredDuringExecution:
              - weight: 100
                preference:
                  matchExpressions:
                    - key: topology.kubernetes.io/region
                      operator: In
                      values:
                        - fr-rosenau

      collaboration:
        enabled: true
        services: "collaboration"
        http: true
        service: true
        replicaCount: 2
        resources:
          limits:
            cpu: 1
            memory: 2Gi
          requests:
            cpu: 500m
            memory: 1Gi
        pdb:
          enabled: true
          minAvailable: 1
        affinity: *regionAffinity
