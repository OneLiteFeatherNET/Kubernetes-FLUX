apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: outline
  namespace: outline
spec:
  values:
    image:
      repository: docker.getoutline.com/outlinewiki/outline
      # This sets the pull policy for images.
      pullPolicy: IfNotPresent
      # Overrides the image tag whose default is the chart appVersion.
      tag: "1.7.1"
    # Applied to every component pod (replaces the former post-render patch).
    priorityClassName: feather-standard
    # One Node process per pod — we scale horizontally via replicas, not via
    # in-pod throng forks. Overrides WEB_CONCURRENCY from the .env secret and
    # keeps per-component memory ~4x lower (the secret sets WEB_CONCURRENCY=4).
    extraEnv:
      - name: WEB_CONCURRENCY
        value: "1"
    securityContext:
      readOnlyRootFilesystem: false
      runAsUser: 1000
    volumeMounts:
      - mountPath: /opt/outline/.env
        name: outline-env-file
        readOnly: true
        subPath: .env
    volumes:
      - name: outline-env-file
        secret:
          items:
            - key: .env
              path: .env
          secretName: outline-env

    ingress:
      enabled: false
    # Exposed via Cloudflare Tunnel (see ingress.yaml); chart HTTPRoute off.
    httpRoute:
      enabled: false

    # Every Outline service runs as its own stateless Deployment. web,
    # websockets and collaboration each serve a distinct path and get their own
    # Service; the Cloudflare Tunnel Ingress (ingress.yaml) routes:
    #   /realtime      -> outline-websockets
    #   /collaboration -> outline-collaboration
    #   /              -> outline-web
    # Multi-replica collaboration requires REDIS_COLLABORATION_URL in outline-env.
    components:
      web:
        enabled: true
        services: "web"
        http: true
        service: true
        replicaCount: 2
        resources:
          limits:
            cpu: 2
            memory: 2Gi
          requests:
            cpu: 1
            memory: 1Gi
        livenessProbe:
          initialDelaySeconds: 60
          httpGet:
            path: /_health
            port: http
        readinessProbe:
          initialDelaySeconds: 60
          httpGet:
            path: /_health
            port: http
        pdb:
          enabled: true
          minAvailable: 1
        affinity: &regionAffinity
          nodeAffinity:
            preferredDuringSchedulingIgnoredDuringExecution:
              - weight: 100
                preference:
                  matchExpressions:
                    - key: topology.kubernetes.io/region
                      operator: In
                      values:
                        - fr-rosenau

      websockets:
        enabled: true
        services: "websockets"
        http: true
        service: true
        replicaCount: 2
        resources:
          limits:
            cpu: 500m
            memory: 1536Mi
          requests:
            cpu: 200m
            memory: 768Mi
        pdb:
          enabled: true
          minAvailable: 1
        affinity: *regionAffinity

      collaboration:
        enabled: true
        services: "collaboration"
        http: true
        service: true
        replicaCount: 2
        resources:
          limits:
            cpu: 1
            memory: 2Gi
          requests:
            cpu: 500m
            memory: 1Gi
        pdb:
          enabled: true
          minAvailable: 1
        affinity: *regionAffinity

      worker:
        enabled: true
        services: "worker"
        http: false
        replicaCount: 2
        resources:
          limits:
            cpu: 1
            memory: 1536Mi
          requests:
            cpu: 500m
            memory: 768Mi
        pdb:
          enabled: true
          minAvailable: 1
        affinity: *regionAffinity

      cron:
        enabled: true
        services: "cron"
        http: false
        replicaCount: 1
        strategy:
          type: Recreate
        resources:
          limits:
            cpu: 200m
            memory: 1Gi
          requests:
            cpu: 50m
            memory: 512Mi
        pdb:
          enabled: false
        affinity: *regionAffinity
