apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: outline
  namespace: outline
spec:
  postRenderers:
    - kustomize:
        patches:
          - target:
              kind: Deployment
              name: outline
            patch: |
              - op: add
                path: /spec/template/spec/priorityClassName
                value: feather-standard
  values:
    affinity:
      nodeAffinity:
        preferredDuringSchedulingIgnoredDuringExecution:
          - weight: 100
            preference:
              matchExpressions:
                - key: topology.kubernetes.io/region
                  operator: In
                  values:
                    - fr-rosenau
    image:
      repository: docker.getoutline.com/outlinewiki/outline
      # This sets the pull policy for images.
      pullPolicy: IfNotPresent
      # Overrides the image tag whose default is the chart appVersion.
      tag: "1.7.1"
    resources:
      limits:
        cpu: 2
        memory: 2Gi
      requests:
        cpu: 1
        memory: 1Gi
    securityContext:
      readOnlyRootFilesystem: false
      runAsUser: 1000
    volumeMounts:
      - mountPath: /opt/outline/.env
        name: outline-env-file
        readOnly: true
        subPath: .env
    volumes:
      - name: outline-env-file
        secret:
          items:
            - key: .env
              path: .env
          secretName: outline-env

    replicaCount: 1
    ingress:
      enabled: false
    # Exposed via Cloudflare Tunnel (see ingress.yaml); chart HTTPRoute off.
    httpRoute:
      enabled: false
    livenessProbe:
      initialDelaySeconds: 60
      httpGet:
        path: /_health
        port: 3000
    readinessProbe:
      initialDelaySeconds: 60
      httpGet:
        path: /_health
        port: 3000

