apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: outline
  namespace: outline
spec:
  values:
    image:
      repository: docker.getoutline.com/outlinewiki/outline
      # This sets the pull policy for images.
      pullPolicy: IfNotPresent
      # Overrides the image tag whose default is the chart appVersion.
      tag: "1.7.1"
    # Applied to every component pod (replaces the former post-render patch).
    priorityClassName: feather-standard
    # One Node process per pod — we scale horizontally via replicas, not via
    # in-pod throng forks. Overrides WEB_CONCURRENCY from the .env secret and
    # keeps per-component memory ~4x lower (the secret sets WEB_CONCURRENCY=4).
    extraEnv:
      - name: WEB_CONCURRENCY
        value: "1"
      # Postgres max_connections is 100 cluster-wide. With ~9 component pods a
      # MIN=5/MAX=10 pool (from the .env) exhausts it. Keep a small pool per pod
      # (9 pods x 3 = 27 max). The CNPG pooler is session-mode, so it would not
      # multiplex these away.
      - name: DATABASE_CONNECTION_POOL_MIN
        value: "1"
      - name: DATABASE_CONNECTION_POOL_MAX
        value: "3"
    securityContext:
      readOnlyRootFilesystem: false
      runAsUser: 1000
    volumeMounts:
      - mountPath: /opt/outline/.env
        name: outline-env-file
        readOnly: true
        subPath: .env
    volumes:
      - name: outline-env-file
        secret:
          items:
            - key: .env
              path: .env
          secretName: outline-env

    ingress:
      enabled: false
    # Exposed via Cloudflare Tunnel (see ingress.yaml); chart HTTPRoute off.
    httpRoute:
      enabled: false

    # Outline services run as stateless Deployments. websockets (socket.io
    # realtime) attaches to the web HTTP server and the browser connects to the
    # app origin (there is no WEBSOCKETS_URL), so it must run inside the web
    # component, not standalone. collaboration has its own URL/path and runs
    # separately. The Cloudflare Tunnel Ingress (ingress.yaml) routes:
    #   /collaboration -> outline-collaboration
    #   /              -> outline-web (serves the app, API and /realtime)
    # Multi-replica collaboration requires REDIS_COLLABORATION_URL in outline-env.
    components:
      web:
        enabled: true
        services: "web,websockets"
        http: true
        service: true
        replicaCount: 2
        resources:
          limits:
            cpu: 2
            memory: 2Gi
          requests:
            cpu: 1
            memory: 1Gi
        livenessProbe:
          initialDelaySeconds: 60
          httpGet:
            path: /_health
            port: http
        readinessProbe:
          initialDelaySeconds: 60
          httpGet:
            path: /_health
            port: http
        pdb:
          enabled: true
          minAvailable: 1
        affinity: &regionAffinity
          nodeAffinity:
            preferredDuringSchedulingIgnoredDuringExecution:
              - weight: 100
                preference:
                  matchExpressions:
                    - key: topology.kubernetes.io/region
                      operator: In
                      values:
                        - fr-rosenau

      collaboration:
        enabled: true
        services: "collaboration"
        http: true
        service: true
        replicaCount: 2
        resources:
          limits:
            cpu: 1
            memory: 2Gi
          requests:
            cpu: 500m
            memory: 1Gi
        pdb:
          enabled: true
          minAvailable: 1
        affinity: *regionAffinity

      worker:
        enabled: true
        services: "worker"
        http: false
        replicaCount: 2
        resources:
          limits:
            cpu: 1
            memory: 1536Mi
          requests:
            cpu: 500m
            memory: 768Mi
        pdb:
          enabled: true
          minAvailable: 1
        affinity: *regionAffinity

      cron:
        enabled: true
        services: "cron"
        http: false
        replicaCount: 1
        strategy:
          type: Recreate
        resources:
          limits:
            cpu: 200m
            memory: 1Gi
          requests:
            cpu: 50m
            memory: 512Mi
        pdb:
          enabled: false
        affinity: *regionAffinity
