apiVersion: apps/v1
kind: Deployment
metadata:
  name: shlink-redis
  labels:
    app: shlink-redis
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: shlink-redis
  template:
    metadata:
      labels:
        app: shlink-redis
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 999
        fsGroup: 999
      containers:
        - name: redis
          image: redis:7-alpine
          args:
            - "--save"
            - ""
            - "--appendonly"
            - "no"
            - "--maxmemory"
            - "96mb"
            - "--maxmemory-policy"
            - "allkeys-lru"
          ports:
            - name: redis
              containerPort: 6379
          livenessProbe:
            exec:
              command: ["redis-cli", "ping"]
            initialDelaySeconds: 5
            periodSeconds: 10
          readinessProbe:
            exec:
              command: ["redis-cli", "ping"]
            initialDelaySeconds: 2
            periodSeconds: 5
          resources:
            requests:
              cpu: 25m
              memory: 32Mi
            limits:
              cpu: 250m
              memory: 128Mi
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          volumeMounts:
            - name: data
              mountPath: /data
      volumes:
        # Ephemeral on purpose: shlink only uses Redis for locks,
        # cache and pub/sub - all transient, safe to lose on restart.
        - name: data
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: shlink-redis
  labels:
    app: shlink-redis
spec:
  type: ClusterIP
  selector:
    app: shlink-redis
  ports:
    - name: redis
      port: 6379
      targetPort: redis
