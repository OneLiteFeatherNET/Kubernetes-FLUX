apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: shlink
  namespace: shlink
spec:
  values:
    affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
              - matchExpressions:
                  - key: topology.kubernetes.io/region
                    operator: In
                    values:
                      - fr-rosenau
    image:
      repository: shlinkio/shlink
      pullPolicy: IfNotPresent
      # Overrides the image tag whose default is the chart appVersion.
      tag: "5.0.2"
    replicaCount: 3
    ingress:
      enabled: false
    httpRoute:
      enabled: true
      parentRefs:
        - name: eg
          namespace: envoy
          sectionName: https
      hostnames:
        - shlink.onelitefeather.dev
        - 1lf.link
      rules:
        - matches:
            - path:
                type: PathPrefix
                value: /
    livenessProbe:
      httpGet:
        path: /rest/health
        port: http
        initialDelaySeconds: 10
        periodSeconds: 10
        timeoutSeconds: 5
        successThreshold: 1
        failureThreshold: 5
    readinessProbe:
      httpGet:
        path: /rest/health
        port: http
        initialDelaySeconds: 10
        periodSeconds: 10
        timeoutSeconds: 5
        successThreshold: 1
        failureThreshold: 5
    service:
      port: 8080
    podAnnotations:
      prometheus.io/scrape: "false"
    resources:
      limits:
        cpu: 2
        memory: 2Gi
      requests:
        cpu: 200m
        memory: .5Gi
    autoscaling:
      enabled: true
      minReplicas: 1
      maxReplicas: 3
      targetCPUUtilizationPercentage: 95
      # targetMemoryUtilizationPercentage: 80
    # All shlink config is passed generically via env (chart is now
    # fully generic; no bespoke .Values.shlink.*).
    env:
      - name: DEFAULT_DOMAIN
        value: "1lf.link"
      - name: IS_HTTPS_ENABLED
        value: "true"
      - name: TIMEZONE
        value: "Europe/Helsinki"
      - name: LOGS_FORMAT
        value: "json"
      - name: DB_DRIVER
        value: "maria"
      - name: DB_HOST
        value: "maxscale-galera.mariadb-galera.svc.cluster.local"
      - name: DB_NAME
        value: "shlink"
      - name: DB_USER
        value: "shlink"
      - name: DB_PORT
        value: "3306"
      - name: SHELL_VERBOSITY
        value: "3"
      - name: DB_PASSWORD
        valueFrom:
          secretKeyRef:
            name: shlink-secret
            key: DB_PASSWORD
      - name: GEOLITE_LICENSE_KEY
        valueFrom:
          secretKeyRef:
            name: shlink-secret
            key: GEOLITE_LICENSE_KEY
      # Plain Redis via the HAProxy redis-master-proxy (always routes
      # to the current Sentinel master). NOT sentinel mode -> no
      # REDIS_SENTINEL_SERVICE; the password must be embedded in the
      # REDIS_SERVERS URI (shlink ignores REDIS_SERVERS_PASSWORD when
      # no sentinel service is set). shlink-secret.REDIS_SERVERS must be
      # tcp://:<redis-password>@redis-master-proxy.redis.svc.cluster.local:6379
      - name: REDIS_PUB_SUB_ENABLED
        value: "true"
      - name: REDIS_SERVERS
        valueFrom:
          secretKeyRef:
            name: shlink-secret
            key: REDIS_SERVERS
      - name: SKIP_INITIAL_GEOLITE_DOWNLOAD
        value: "true"