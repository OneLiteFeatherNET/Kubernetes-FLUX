apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: shlink
  namespace: shlink
spec:
  postRenderers:
    - kustomize:
        patches:
          - target:
              kind: Deployment
              name: shlink
            patch: |
              - op: add
                path: /spec/template/spec/priorityClassName
                value: feather-standard
  values:
    affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
              - matchExpressions:
                  - key: topology.kubernetes.io/region
                    operator: In
                    values:
                      - fr-rosenau
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchLabels:
                    app.kubernetes.io/name: shlink
                topologyKey: kubernetes.io/hostname
    image:
      repository: shlinkio/shlink
      pullPolicy: IfNotPresent
      # Overrides the image tag whose default is the chart appVersion.
      tag: "5.1.4"
    replicaCount: 3
    ingress:
      enabled: false
    # Exposed via Cloudflare Tunnel (see ingress.yaml); chart HTTPRoute off.
    httpRoute:
      enabled: false
    livenessProbe:
      httpGet:
        path: /rest/health
        port: http
        initialDelaySeconds: 10
        periodSeconds: 10
        timeoutSeconds: 5
        successThreshold: 1
        failureThreshold: 5
    readinessProbe:
      httpGet:
        path: /rest/health
        port: http
        initialDelaySeconds: 10
        periodSeconds: 10
        timeoutSeconds: 5
        successThreshold: 1
        failureThreshold: 5
    service:
      port: 8080
    podLabels:
      logs.onelitefeather.net/env: prod
    podAnnotations:
      prometheus.io/scrape: "false"
    resources:
      limits:
        cpu: 2
        memory: 2Gi
      requests:
        cpu: 200m
        memory: .5Gi
    autoscaling:
      enabled: true
      minReplicas: 3
      maxReplicas: 3
      targetCPUUtilizationPercentage: 95
      # targetMemoryUtilizationPercentage: 80
    # All shlink config is passed generically via env (chart is now
    # fully generic; no bespoke .Values.shlink.*).
    env:
      - name: DEFAULT_DOMAIN
        value: "1lf.link"
      - name: IS_HTTPS_ENABLED
        value: "true"
      - name: TIMEZONE
        value: "UTC"
      - name: LOGS_FORMAT
        value: "json"
      - name: DB_DRIVER
        value: "maria"
      - name: DB_HOST
        value: "maxscale-galera.mariadb-galera.svc.cluster.local"
      - name: DB_NAME
        value: "shlink"
      - name: DB_USER
        value: "shlink"
      - name: DB_PORT
        value: "3306"
      - name: DB_PASSWORD
        valueFrom:
          secretKeyRef:
            name: shlink-secret
            key: DB_PASSWORD
      - name: GEOLITE_LICENSE_KEY
        valueFrom:
          secretKeyRef:
            name: shlink-secret
            key: GEOLITE_LICENSE_KEY
      - name: REDIS_PUB_SUB_ENABLED
        value: "true"
      # Dragonfly cutover: single DIRECT connection (no Sentinel; the operator
      # keeps the `dragonfly` Service pointed at the current master). IMPORTANT:
      # in standalone mode shlink-common (RedisFactory::resolveOptions) ONLY
      # applies REDIS_SERVERS_PASSWORD for sentinel; for a plain server the
      # password MUST be embedded in the URI (tcp://:pass@host:port/db). The full
      # URI (incl. password + DB 8) therefore comes from the secret so it stays
      # out of git. See docs/dragonfly-redis-cutover.md.
      - name: REDIS_SERVERS
        valueFrom:
          secretKeyRef:
            name: shlink-secret
            key: REDIS_SERVERS
      - name: SKIP_INITIAL_GEOLITE_DOWNLOAD
        value: "true"
      - name: WEB_WORKER_NUM
        value: "6"
      - name: TASK_WORKER_NUM
        value: "4"