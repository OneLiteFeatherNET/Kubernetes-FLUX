apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: shlink
generatorOptions:
  disableNameSuffixHash: true
resources:
  - ../../../../../apps/base/shlink/
  - ingress.yaml
  - pdb.yaml
patches:
  - path: release.yaml

secretGenerator:
  - name: shlink-secret
    envs:
      - shlink.env
