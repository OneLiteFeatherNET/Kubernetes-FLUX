apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: uptime-kuma
  namespace: uptime-kuma
spec:
  chart:
    spec:
      version: "=4.1.0"
  valuesFrom:
    - kind: Secret
      name: uptime-kuma-metrics-auth
      valuesKey: username
      targetPath: serviceMonitor.basicAuth.username
    - kind: Secret
      name: uptime-kuma-metrics-auth
      valuesKey: password
      targetPath: serviceMonitor.basicAuth.password
  values:
    podLabels:
      logs.onelitefeather.net/env: prod
    priorityClassName: feather-low
    affinity:
      nodeAffinity:
        requiredDuringSchedulingIgnoredDuringExecution:
          nodeSelectorTerms:
            - matchExpressions:
                - key: topology.kubernetes.io/region
                  operator: In
                  values:
                    - fr-rosenau
    image:
      repository: louislam/uptime-kuma
      pullPolicy: IfNotPresent
      # Overrides the image tag whose default is the chart appVersion.
      tag: "2.3.0"
    ingress:
      enabled: false

    resources:
      limits:
        cpu: 1
        memory: 2Gi
      requests:
        cpu: 500m
        memory: 1Gi
    serviceMonitor:
      enabled: true
    volume:
      enabled: false
    podEnv:
      - name: UPTIME_KUMA_DB_TYPE
        value: "mariadb"
      - name: UPTIME_KUMA_DB_HOSTNAME
        value: "maxscale-galera.mariadb-galera.svc.cluster.local"
      - name: UPTIME_KUMA_DB_PORT
        value: "3306"
      - name: UPTIME_KUMA_DB_NAME
        value: "uptime-kuma"
      - name: UPTIME_KUMA_DB_USERNAME
        value: "uptime-kuma"
      - name: UPTIME_KUMA_DB_PASSWORD
        valueFrom:
          secretKeyRef:
            name: "uptime-kuma-mariadb"
            key: "mariadb-password"
