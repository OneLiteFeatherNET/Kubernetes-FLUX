apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: node-red
  namespace: node-red
spec:
  chart:
    spec:
      version: "*"
  values:
    priorityClassName: feather-low
    persistence:
      enabled: true
      # Pin to the existing PVC capacity; the chart default is smaller and a
      # PVC cannot shrink, which made every helm upgrade fail.
      size: 10Gi
    ingress:
      enabled: false