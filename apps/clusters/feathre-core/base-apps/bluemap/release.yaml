apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: bluemap
  namespace: bluemap
spec:
  chart:
    spec:
      version: "=1.0.5"
  install:
    remediation:
      retries: 0
  interval: 1m0s
  # bluemap's chart has no priorityClassName value; inject it post-render.
  postRenderers:
    - kustomize:
        patches:
          - target:
              kind: Deployment
              name: bluemap
            patch: |
              - op: add
                path: /spec/template/spec/priorityClassName
                value: feather-low
  values:
    podLabels:
      logs.onelitefeather.net/env: prod
    image:
      repository: ghcr.io/bluemap-minecraft/bluemap
      pullPolicy: IfNotPresent
      tag: "v5.22"
    resources:
      limits:
        cpu: 2000m
        memory: "1Gi"
      requests:
        cpu: 500m
        memory: ".5Gi"
    affinity:
      nodeAffinity:
        preferredDuringSchedulingIgnoredDuringExecution:
          - weight: 100
            preference:
              matchExpressions:
                - key: topology.kubernetes.io/region
                  operator: In
                  values:
                    - fr-rosenau
      podAntiAffinity:
        preferredDuringSchedulingIgnoredDuringExecution:
          - weight: 100
            podAffinityTerm:
              labelSelector:
                matchLabels:
                  app.kubernetes.io/name: bluemap
              topologyKey: kubernetes.io/hostname
    replicaCount: 3
    volumes:
      - name: s3-conf
        secret:
          secretName: s3-conf
      - name: bluemap-maps
        configMap:
          name: bluemap-maps
    volumeMounts:
      - name: s3-conf
        readOnly: true
        mountPath: "/app/config/storages/"
      - name: bluemap-maps
        mountPath: /app/config/maps/world.conf
        subPath: world.conf
      - name: bluemap-maps
        mountPath: /app/config/maps/world_nether.conf
        subPath: world_nether.conf
      - name: bluemap-maps
        mountPath: /app/config/maps/world_the_end.conf
        subPath: world_the_end.conf
      - name: bluemap-maps
        mountPath: /app/config/maps/world_op.conf
        subPath: world_op.conf
      - name: bluemap-maps
        mountPath: /app/config/maps/world_op_nether.conf
        subPath: world_op_nether.conf
    bluemap:
      packs:
        - https://github.com/TheMeinerLP/BlueMapS3Storage/releases/download/v1.5.1/BlueMapS3Storage-1.5.1.jar
      config:
        - path: "/app/config/core.conf"
          configMap:
            name: bluemap-config
            key: core.conf
    ingress:
      enabled: false

