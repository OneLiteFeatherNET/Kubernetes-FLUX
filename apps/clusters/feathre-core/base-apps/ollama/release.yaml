apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: ollama
  namespace: ollama
spec:
  values:
    podLabels:
      logs.onelitefeather.net/env: prod
    # CPU-only inference. No GPU on these nodes, so keep the GPU integration
    # off — this also pins the plain (non-rocm/non-cuda) image tag.
    ollama:
      gpu:
        enabled: false
      models:
        # Pulled once at container startup, then cached on the PVC below.
        # gemma4:e4b (Apache 2.0, MoE ~4B active, 9.6Gi) beats qwen2.5:3b on
        # structured extraction (correct enum/scale adherence) and is licensed
        # for commercial use — the n8n forum-application classifier. CPU gen is
        # ~5-6 tok/s; throughput is fine for low-volume async classification.
        # Swap/extend here; every entry adds to first-boot startup time.
        pull:
          - gemma4:e4b
        # Keep the model resident from pod start. The cold load is brutal
        # (~9.6Gi off Ceph-RBD = minutes), so we never want a request to pay it.
        # Pairs with OLLAMA_KEEP_ALIVE=-1 below so it never unloads afterwards.
        run:
          - gemma4:e4b

    # Keep models loaded forever once warm — combined with ollama.models.run
    # above, the model loads at pod start and stays resident, so no request
    # ever eats the multi-minute cold load. (Top-level chart value, sibling of
    # `ollama`.) n8n must still pin num_ctx — a changed context size forces a
    # full model reload (~30s).
    extraEnv:
      - name: OLLAMA_KEEP_ALIVE
        value: "-1"

    # Persist model blobs so a pod restart does not re-download gigabytes.
    persistentVolume:
      enabled: true
      size: 30Gi
      storageClass: ceph-rbd-fr01

    # CPU inference is compute-bound: more cores ≈ more tokens/sec. Memory must
    # hold the model (~3-5Gi for a 3B Q4) plus the KV-cache headroom. Tune to
    # the node's real core count. No CPU limit on purpose — a hard cap would
    # throttle generation; requests + region pin keep scheduling sane.
    resources:
      requests:
        cpu: "4"
        memory: 8Gi
      limits:
        memory: 16Gi

    # Region pin (matches the other stateful apps).
    affinity:
      nodeAffinity:
        preferredDuringSchedulingIgnoredDuringExecution:
          - weight: 100
            preference:
              matchExpressions:
                - key: topology.kubernetes.io/region
                  operator: In
                  values:
                    - fr-rosenau

    # No Ingress / HTTPRoute: Ollama ships NO authentication. It is reached
    # cluster-internally at http://ollama.ollama.svc.cluster.local:11434 (e.g.
    # by n8n). Do NOT expose this Service publicly without an auth proxy in
    # front (Envoy + JWT/basic-auth/SecurityPolicy).
    service:
      type: ClusterIP
      port: 11434
