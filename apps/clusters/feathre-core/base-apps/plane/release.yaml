apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: plane
  namespace: plane
spec:
  postRenderers:
    - kustomize:
        patches:
          - target:
              kind: Deployment
            patch: |
              - op: add
                path: /spec/template/spec/priorityClassName
                value: feather-standard
          # The chart renders RabbitMQ as a StatefulSet, not a Deployment, so it
          # needs its own patch target to get the same priority class.
          - target:
              kind: StatefulSet
            patch: |
              - op: add
                path: /spec/template/spec/priorityClassName
                value: feather-standard
  values:
    planeVersion: v1.3.1

    ingress:
      enabled: false
      appHost: tasks.onelitefeather.net

    postgres:
      local_setup: false
    redis:
      local_setup: false
    minio:
      local_setup: false
    rabbitmq:
      local_setup: true
      storageClass: ceph-rbd-fr01

    external_secrets:
      app_env_existingSecret: plane-app-env
      doc_store_existingSecret: plane-doc-store
      live_env_existingSecret: plane-live-env
      rabbitmq_existingSecret: plane-rabbitmq

    web:
      assign_cluster_ip: true
    space:
      assign_cluster_ip: true
    admin:
      assign_cluster_ip: true
    api:
      assign_cluster_ip: true
    live:
      assign_cluster_ip: true

    # Chart default (1000Mi) OOMKilled the worker repeatedly under real load
    # during initial rollout (5 restarts in 10 minutes). Bump both async
    # components; beat-worker gets the same ceiling pre-emptively since it
    # runs the same backend image under the same workload profile.
    worker:
      memoryLimit: 2000Mi
      cpuLimit: "1"
    beatworker:
      memoryLimit: 1500Mi
      cpuLimit: 500m

    env:
      docstore_bucket: plane
      cors_allowed_origins: "https://tasks.onelitefeather.net"
      default_cluster_domain: cluster.local
