apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: dependency-track
  namespace: dependency-track
spec:
  chart:
    spec:
      version: "=0.39.0"
  postRenderers:
    - kustomize:
        patches:
          - target:
              kind: Deployment
              name: dependency-track-frontend
            patch: |
              - op: add
                path: /spec/template/spec/priorityClassName
                value: feather-standard
          - target:
              kind: StatefulSet
              name: dependency-track-api-server
            patch: |
              - op: add
                path: /spec/template/spec/priorityClassName
                value: feather-standard
  values:

    frontend:
      replicaCount: 3
      resources:
        requests:
          cpu: 10m
          memory: 32Mi
        limits:
          memory: 64Mi
      affinity:
        nodeAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              preference:
                matchExpressions:
                  - key: topology.kubernetes.io/zone
                    operator: In
                    values:
                      - fr01
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchLabels:
                    app.kubernetes.io/name: dependency-track-frontend
                topologyKey: kubernetes.io/hostname
      extraEnv:
        - name: API_BASE_URL
          value: "https://dependency-track.onelitefeather.dev"
        - name: OIDC_LOGIN_BUTTON_TEXT
          value: "Azure AD"
        - name: LOGGING_LEVEL
          value: "WARN"
        - name: OIDC_ISSUER
          valueFrom:
            secretKeyRef:
              key: oidc-issuer
              name: dependency-track-env
        - name: OIDC_CLIENT_ID
          valueFrom:
            secretKeyRef:
              key: oidc-client-id
              name: dependency-track-env
    common:
      secretKey:
        createSecret: true
    # Chart 0.39.0 has NO httpRoute support (only top-level ingress).
    # Routing is done by a standalone HTTPRoute (httproute.yaml).
    ingress:
      enabled: false
    apiServer:
      # DT enforces a hard minimum of 4GB JVM heap at startup. The heap is
      # ~80% of the memory limit (MaxRAMPercentage), so the limit must be >=5Gi;
      # use 6Gi for headroom (~4.8GB heap). Do NOT lower below 5Gi or it crashes.
      resources:
        requests:
          cpu: 500m
          memory: 4Gi
        limits:
          memory: 6Gi
      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
              - matchExpressions:
                  - key: topology.kubernetes.io/zone
                    operator: In
                    values:
                      - fr01
      serviceMonitor:
        enabled: true
      persistentVolume:
        enabled: true
        storageClass: ceph-rbd-fr01
        size: 10Gi
      extraEnv:
        - name: EXTRA_JAVA_OPTIONS
          value: "-DdependencyTrack.logging.level=WARN"
        - name: LOGGING_CONFIG_PATH
          value: "logback-json.xml"
        - name: ALPINE_OIDC_ISSUER
          valueFrom:
            secretKeyRef:
              key: oidc-issuer
              name: dependency-track-env
        - name: ALPINE_OIDC_CLIENT_ID
          valueFrom:
            secretKeyRef:
              key: oidc-client-id
              name: dependency-track-env
        - name: ALPINE_OIDC_ENABLED
          value: "true"
        - name: ALPINE_OIDC_USERNAME_CLAIM
          value: email
        - name: ALPINE_OIDC_USER_PROVISIONING
          value: "true"
        - name: ALPINE_OIDC_TEAMS_CLAIM
          value: groups
        - name: ALPINE_OIDC_TEAM_SYNCHRONIZATION
          value: "true"
        - name: "ALPINE_DATABASE_USERNAME"
          valueFrom:
            secretKeyRef:
              key: db-username
              name: dependency-track-env
        - name: "ALPINE_DATABASE_PASSWORD"
          valueFrom:
            secretKeyRef:
              key: db-password
              name: dependency-track-env
        - name: ALPINE_DATABASE_DRIVER
          value: "org.postgresql.Driver"
        - name: ALPINE_DATABASE_MODE
          value: "external"
        - name: ALPINE_DATABASE_URL
          value: "jdbc:postgresql://feather-core-cluster-pg-pooler-rw.cnpg-system.svc.cluster.local:5432/dependency-track"
