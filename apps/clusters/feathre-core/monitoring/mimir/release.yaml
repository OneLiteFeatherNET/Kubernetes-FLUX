apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: mimir
  namespace: grafana
spec:
  postRenderers:
    - kustomize:
        patches:
          - target:
              kind: Deployment
              labelSelector: app.kubernetes.io/instance=mimir
            patch: |
              - op: add
                path: /spec/template/spec/priorityClassName
                value: feather-high
          - target:
              kind: StatefulSet
              labelSelector: app.kubernetes.io/instance=mimir
            patch: |
              - op: add
                path: /spec/template/spec/priorityClassName
                value: feather-high
  values:
    minio:
      enabled: false
    kafka:
      enabled: false
    global:
      extraEnvFrom:
        - secretRef:
            name: mimir-s3
      # Pod labels for all chart-managed components (mimir-distributed v4.5+).
      podLabels:
        logs.onelitefeather.net/env: prod
    mimir:
      structuredConfig:
        multitenancy_enabled: false
        ingest_storage:
          enabled: false
        ingester:
          push_grpc_method_enabled: true
        limits:
          compactor_blocks_retention_period: 365d
          # Default 150k was exhausted (new series silently rejected with
          # err-mimir-max-series-per-user), blocking envoy metrics ingestion.
          # 400k covers the in-memory head (stale series linger up to 2h
          # after compaction) on top of ~275k active series; the apiserver
          # bucket drops in kube-prometheus-stack bring actives down again.
          max_global_series_per_user: 400000
        common:
          storage:
            backend: s3
            s3:
              # Internal RGW service (path-style, http) — decoupled from the
              # external s3.onelitefeather.net ingress path.
              endpoint: rook-ceph-rgw-feather-s3.rook-ceph-fr01.svc:80
              region: us-west-1
              access_key_id: ${AWS_ACCESS_KEY_ID}
              secret_access_key: ${AWS_SECRET_ACCESS_KEY}
              insecure: true
              bucket_lookup_type: path
        blocks_storage:
          backend: s3
          s3:
            bucket_name: mimir-blocks
            endpoint: rook-ceph-rgw-feather-s3.rook-ceph-fr01.svc:80
            region: us-west-1
            access_key_id: ${AWS_ACCESS_KEY_ID}
            secret_access_key: ${AWS_SECRET_ACCESS_KEY}
            insecure: true
            bucket_lookup_type: path
          tsdb:
            dir: /data/tsdb
        # HA-tracker/dedup removed: metrics now arrive via clustered Alloy
        # (apps/clusters/feathre-core/base-apps/alloy-metrics), which shards
        # scrape targets across replicas instead of scraping everything
        # twice, so there are no duplicate __replica__-tagged samples to
        # deduplicate here anymore.
        alertmanager_storage:
          backend: s3
          s3:
            bucket_name: mimir-alertmanager
            endpoint: rook-ceph-rgw-feather-s3.rook-ceph-fr01.svc:80
            region: us-west-1
            access_key_id: ${AWS_ACCESS_KEY_ID}
            secret_access_key: ${AWS_SECRET_ACCESS_KEY}
            insecure: true
            bucket_lookup_type: path
        ruler_storage:
          backend: s3
          s3:
            bucket_name: mimir-ruler
            endpoint: rook-ceph-rgw-feather-s3.rook-ceph-fr01.svc:80
            region: us-west-1
            access_key_id: ${AWS_ACCESS_KEY_ID}
            secret_access_key: ${AWS_SECRET_ACCESS_KEY}
            insecure: true
            bucket_lookup_type: path
    gateway:
      enabled: true
      replicas: 2
      resources:
        requests:
          cpu: 10m
          memory: 32Mi
        limits:
          cpu: 500m
          memory: 128Mi
      affinity:
        nodeAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              preference:
                matchExpressions:
                  - key: topology.kubernetes.io/zone
                    operator: In
                    values:
                      - fr01
      ingress:
        enabled: false
      podDisruptionBudget:
        maxUnavailable: 1
    alertmanager:
      replicas: 2
      resources:
        requests:
          cpu: 10m
          memory: 64Mi
        limits:
          cpu: 500m
          memory: 128Mi
      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
              - matchExpressions:
                  - key: topology.kubernetes.io/zone
                    operator: In
                    values:
                      - fr01
      persistentVolume:
        enabled: true
        storageClass: ceph-rbd-fr01
        size: 10Gi
    ingester:
      replicas: 3
      resources:
        requests:
          cpu: 100m
          memory: 1536Mi
        limits:
          cpu: "2"
          memory: 2560Mi
      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
              - matchExpressions:
                  - key: topology.kubernetes.io/zone
                    operator: In
                    values:
                      - fr01
      persistentVolume:
        enabled: true
        storageClass: ceph-rbd-fr01
        size: 20Gi
      zoneAwareReplication:
        enabled: false
    querier:
      replicas: 2
      resources:
        requests:
          cpu: 100m
          memory: 128Mi
        limits:
          cpu: "1"
          memory: 512Mi
      affinity:
        nodeAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              preference:
                matchExpressions:
                  - key: topology.kubernetes.io/zone
                    operator: In
                    values:
                      - fr01
    query_frontend:
      replicas: 2
      resources:
        requests:
          cpu: 100m
          memory: 128Mi
        limits:
          cpu: "1"
          memory: 512Mi
      affinity:
        nodeAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              preference:
                matchExpressions:
                  - key: topology.kubernetes.io/zone
                    operator: In
                    values:
                      - fr01
    query_scheduler:
      replicas: 2
      resources:
        requests:
          cpu: 100m
          memory: 128Mi
        limits:
          cpu: 500m
          memory: 256Mi
      affinity:
        nodeAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              preference:
                matchExpressions:
                  - key: topology.kubernetes.io/zone
                    operator: In
                    values:
                      - fr01
    ruler:
      replicas: 1
      resources:
        requests:
          cpu: 100m
          memory: 128Mi
        limits:
          cpu: "1"
          memory: 512Mi
      affinity:
        nodeAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              preference:
                matchExpressions:
                  - key: topology.kubernetes.io/zone
                    operator: In
                    values:
                      - fr01
    overrides_exporter:
      resources:
        requests:
          cpu: 100m
          memory: 128Mi
        limits:
          cpu: 500m
          memory: 256Mi
      affinity:
        nodeAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              preference:
                matchExpressions:
                  - key: topology.kubernetes.io/zone
                    operator: In
                    values:
                      - fr01
    rollout_operator:
      affinity:
        nodeAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              preference:
                matchExpressions:
                  - key: topology.kubernetes.io/zone
                    operator: In
                    values:
                      - fr01
    distributor:
      replicas: 2
      resources:
        requests:
          cpu: 100m
          memory: 1Gi
        limits:
          cpu: "2"
          memory: 2Gi
      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
              - matchExpressions:
                  - key: topology.kubernetes.io/zone
                    operator: In
                    values:
                      - fr01
    store_gateway:
      replicas: 2
      resources:
        requests:
          cpu: 100m
          memory: 512Mi
        limits:
          cpu: "1"
          memory: 1Gi
      persistentVolume:
        enabled: true
        storageClass: ceph-rbd-fr01
        size: 10Gi
      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
              - matchExpressions:
                  - key: topology.kubernetes.io/zone
                    operator: In
                    values:
                      - fr01
      zoneAwareReplication:
        enabled: false
    compactor:
      resources:
        requests:
          cpu: 100m
          memory: 512Mi
        limits:
          cpu: "2"
          memory: 1Gi
      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
              - matchExpressions:
                  - key: topology.kubernetes.io/zone
                    operator: In
                    values:
                      - fr01
      persistentVolume:
        enabled: true
        storageClass: ceph-rbd-fr01
        size: 10Gi
    metaMonitoring:
      serviceMonitor:
        enabled: true
