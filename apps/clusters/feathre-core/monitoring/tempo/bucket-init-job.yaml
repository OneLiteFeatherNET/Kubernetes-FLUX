apiVersion: batch/v1
kind: Job
metadata:
  name: tempo-traces-bucket-init
spec:
  backoffLimit: 5
  ttlSecondsAfterFinished: 600
  template:
    spec:
      restartPolicy: OnFailure
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: create-bucket
          image: amazon/aws-cli:2.17.60
          # RGW's zonegroup doesn't accept any explicit LocationConstraint
          # (neither a real AWS region nor its own "default" api_name fails
          # CreateBucket with InvalidLocationConstraint) — us-east-1 is the
          # one AWS CLI special-cases to omit the constraint element entirely,
          # which is what RGW here actually accepts.
          # Owner ends up being the "tempo" CephObjectStoreUser (creds from
          # envFrom), matching the ownership convention used by every other
          # bucket in this cluster (harbor, loki, mimir, ...).
          command:
            - sh
            - -c
            - >
              aws --endpoint-url=http://rook-ceph-rgw-feather-s3.rook-ceph-fr01.svc:80
              --region=us-east-1 s3 mb s3://tempo-traces
              || aws --endpoint-url=http://rook-ceph-rgw-feather-s3.rook-ceph-fr01.svc:80
              --region=us-east-1 s3 ls s3://tempo-traces
          envFrom:
            - secretRef:
                name: tempo-s3
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
            readOnlyRootFilesystem: true
