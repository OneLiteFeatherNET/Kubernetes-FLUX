apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: tempo
  namespace: grafana
spec:
  values:
    global:
      podLabels:
        logs.onelitefeather.net/env: prod
      priorityClassName: feather-high
      extraEnvFrom:
        - secretRef:
            name: tempo-s3
    multitenancyEnabled: false
    traces:
      otlp:
        http:
          enabled: true
        grpc:
          enabled: true
    storage:
      trace:
        backend: s3
        s3:
          # Internal RGW service (path-style, http) — decoupled from the
          # external s3.onelitefeather.net ingress path.
          bucket: tempo-traces
          endpoint: rook-ceph-rgw-feather-s3.rook-ceph-fr01.svc:80
          region: us-west-1
          access_key: ${AWS_ACCESS_KEY_ID}
          secret_key: ${AWS_SECRET_ACCESS_KEY}
          insecure: true
          forcepathstyle: true
    compactor:
      replicas: 1
      # Needed here (not on global.extraArgs) so ${AWS_ACCESS_KEY_ID}/
      # ${AWS_SECRET_ACCESS_KEY} above get expanded — global.extraArgs also
      # reaches memcached, which doesn't understand this Tempo-binary flag
      # and crashloops on it ("Maximum connections must be greater than 0").
      extraArgs:
        - -config.expand-env=true
      resources:
        requests:
          cpu: 100m
          memory: 128Mi
        limits:
          cpu: "1"
          memory: 512Mi
      affinity: |
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
              - matchExpressions:
                  - key: topology.kubernetes.io/zone
                    operator: In
                    values:
                      - fr01
      config:
        compaction:
          # Traces are far higher-volume/lower-value per byte than logs or
          # metrics, so keep retention short to bound the S3 bucket size.
          block_retention: 168h
    distributor:
      replicas: 1
      extraArgs:
        - -config.expand-env=true
      resources:
        requests:
          cpu: 50m
          memory: 128Mi
        limits:
          cpu: "1"
          memory: 512Mi
      affinity: |
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
              - matchExpressions:
                  - key: topology.kubernetes.io/zone
                    operator: In
                    values:
                      - fr01
    ingester:
      replicas: 1
      extraArgs:
        - -config.expand-env=true
      config:
        replication_factor: 1
      resources:
        requests:
          cpu: 100m
          memory: 256Mi
        limits:
          cpu: "1"
          memory: 1Gi
      persistence:
        enabled: true
        size: 10Gi
        storageClass: ceph-rbd-fr01
      affinity: |
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
              - matchExpressions:
                  - key: topology.kubernetes.io/zone
                    operator: In
                    values:
                      - fr01
    querier:
      replicas: 1
      extraArgs:
        - -config.expand-env=true
      resources:
        requests:
          cpu: 50m
          memory: 128Mi
        limits:
          cpu: "1"
          memory: 512Mi
      affinity: |
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
              - matchExpressions:
                  - key: topology.kubernetes.io/zone
                    operator: In
                    values:
                      - fr01
    queryFrontend:
      replicas: 1
      extraArgs:
        - -config.expand-env=true
      resources:
        requests:
          cpu: 50m
          memory: 128Mi
        limits:
          cpu: "1"
          memory: 512Mi
      affinity: |
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
              - matchExpressions:
                  - key: topology.kubernetes.io/zone
                    operator: In
                    values:
                      - fr01
    metricsGenerator:
      enabled: true
      extraArgs:
        - -config.expand-env=true
      config:
        storage:
          remote_write:
            - url: http://mimir-gateway.grafana.svc.cluster.local/api/v1/push
      resources:
        requests:
          cpu: 50m
          memory: 128Mi
        limits:
          cpu: "1"
          memory: 512Mi
      affinity: |
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
              - matchExpressions:
                  - key: topology.kubernetes.io/zone
                    operator: In
                    values:
                      - fr01
    # Enables the metrics-generator processors above — without this the
    # generator runs but produces no metrics (span rate/service graph
    # panels in Grafana would keep showing "empty ring"/no data).
    overrides:
      defaults:
        metrics_generator:
          processors:
            - service-graphs
            - span-metrics
    gateway:
      enabled: true
      replicas: 2
      resources:
        requests:
          cpu: 10m
          memory: 32Mi
        limits:
          cpu: 500m
          memory: 128Mi
      affinity: |
        nodeAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              preference:
                matchExpressions:
                  - key: topology.kubernetes.io/zone
                    operator: In
                    values:
                      - fr01
      ingress:
        enabled: false
    metaMonitoring:
      serviceMonitor:
        enabled: true
