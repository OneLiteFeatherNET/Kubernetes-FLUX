apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: grafana
generatorOptions:
  disableNameSuffixHash: true
resources:
  - ../../../../../apps/base/tempo
  - httproute.yaml
patches:
  - path: release.yaml

secretGenerator:
  - name: tempo-s3
    envs:
      - tempo-s3.sops.env
