apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: loki
  namespace: grafana
spec:
  postRenderers:
    - kustomize:
        patches:
          - target:
              kind: StatefulSet
              labelSelector: app.kubernetes.io/instance=loki
            patch: |
              - op: add
                path: /spec/template/spec/priorityClassName
                value: feather-high
          - target:
              kind: Deployment
              labelSelector: app.kubernetes.io/instance=loki
            patch: |
              - op: add
                path: /spec/template/spec/priorityClassName
                value: feather-high
  valuesFrom:
    - kind: Secret
      name: loki-s3
      valuesKey: accessKeyId
      targetPath: loki.storage.s3.accessKeyId
    - kind: Secret
      name: loki-s3
      valuesKey: secretAccessKey
      targetPath: loki.storage.s3.secretAccessKey
  values:
    deploymentMode: SingleBinary
    loki:
      auth_enabled: false
      commonConfig:
        replication_factor: 1
      limits_config:
        retention_period: 168h
        allow_structured_metadata: true
        # Grafana's "service" picker keys off the service_name label, which Loki
        # derives from the first matching label below. Chart-shared apps land
        # under app="micronaut", so prioritise instance (the Helm release name,
        # e.g. otis) ahead of app to give each release its own service identity.
        discover_service_name:
          - service_name
          - service
          - instance
          - app
          - application
          - name
          - container
        ingestion_rate_mb: 8
        ingestion_burst_size_mb: 16
        per_stream_rate_limit: 5MB
        per_stream_rate_limit_burst: 20MB
        max_global_streams_per_user: 5000
        reject_old_samples: true
        reject_old_samples_max_age: 168h
      compactor:
        working_directory: /var/loki/compactor
        retention_enabled: true
        retention_delete_delay: 2h
        retention_delete_worker_count: 150
        delete_request_store: s3
        compaction_interval: 10m
      storage:
        type: s3
        bucketNames:
          chunks: loki-chunks
          ruler: loki-ruler
        s3:
          # Internal RGW service (path-style, http) — decoupled from the
          # external s3.onelitefeather.net ingress path.
          endpoint: http://rook-ceph-rgw-feather-s3.rook-ceph-fr01.svc:80
          region: us-west-1
          s3ForcePathStyle: true
          insecure: true
      schemaConfig:
        configs:
          - from: "2024-04-01"
            store: tsdb
            object_store: s3
            schema: v13
            index:
              prefix: index_
              period: 24h
    singleBinary:
      podLabels:
        logs.onelitefeather.net/env: prod
      replicas: 1
      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
              - matchExpressions:
                  - key: topology.kubernetes.io/zone
                    operator: In
                    values:
                      - fr01
      resources:
        requests:
          cpu: 250m
          memory: 512Mi
        limits:
          cpu: 2
          memory: 2Gi
      persistence:
        enabled: true
        size: 20Gi
        storageClass: ceph-rbd-fr01
        accessModes:
          - ReadWriteOnce
    write:
      replicas: 0
    read:
      replicas: 0
    backend:
      replicas: 0
    gateway:
      podLabels:
        logs.onelitefeather.net/env: prod
      resources:
        requests:
          cpu: 10m
          memory: 32Mi
        limits:
          memory: 128Mi
      affinity:
        nodeAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              preference:
                matchExpressions:
                  - key: topology.kubernetes.io/zone
                    operator: In
                    values:
                      - fr01
      ingress:
        enabled: false
    lokiCanary:
      enabled: true
      podLabels:
        logs.onelitefeather.net/env: prod
      kind: DaemonSet
      push: true
      labelname: pod
      resources:
        requests:
          cpu: 25m
          memory: 64Mi
        limits:
          cpu: 200m
          memory: 256Mi
    monitoring:
      dashboards:
        enabled: true
      rules:
        enabled: true
      serviceMonitor:
        enabled: true
