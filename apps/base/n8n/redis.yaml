apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: n8n-redis
  namespace: n8n
spec:
  releaseName: n8n-redis
  chartRef:
    kind: OCIRepository
    name: redis
    namespace: flux-system
  install:
    remediation:
      retries: 3
  upgrade:
    remediation:
      retries: 3
  interval: 1m0s
  # Dedicated single-master Redis for n8n's BullMQ queue. Standalone (no
  # Sentinel): the n8n chart points at one host:port and would hit READONLY
  # errors against a replica, so a single writable master is the correct
  # topology here. See [[redis-sentinel-master-routing]].
  values:
    architecture: standalone
    # Bitnami removed the chart-default docker.io/bitnami/redis tags from
    # Docker Hub (moved to the bitnamilegacy repo), so the 21.2.3 default
    # 8.0.2-debian-12-r3 404s on pull. Pin to the same legacy image the
    # shared cluster Redis uses. allowInsecureImages is required because
    # overriding to a non-default repo trips Bitnami's image verification.
    image:
      registry: docker.io
      repository: bitnamilegacy/redis
      tag: 7.4.2-debian-12-r4
    global:
      security:
        allowInsecureImages: true
    auth:
      enabled: true
      existingSecret: n8n-redis
      existingSecretPasswordKey: redis-password
    master:
      priorityClassName: feather-high
      persistence:
        enabled: true
        storageClass: ceph-rbd-fr01
        size: 8Gi
      resources:
        requests:
          cpu: 50m
          memory: 128Mi
        limits:
          memory: 256Mi
