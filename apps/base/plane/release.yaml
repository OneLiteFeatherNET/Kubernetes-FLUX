apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: plane
  namespace: plane
spec:
  releaseName: plane
  chart:
    spec:
      chart: plane-enterprise
      version: "3.0.0"
      sourceRef:
        kind: HelmRepository
        name: plane
        namespace: flux-system
  install:
    timeout: 15m0s
    remediation:
      retries: 3
  upgrade:
    timeout: 15m0s
    remediation:
      retries: 3
      remediateLastFailure: true
  interval: 1m0s
  # Default values
  #
  values: {}
