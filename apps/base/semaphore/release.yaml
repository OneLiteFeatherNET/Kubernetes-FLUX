apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: semaphore
  namespace: semaphore
spec:
  releaseName: semaphore
  chart:
    spec:
      chart: semaphore
      sourceRef:
        kind: HelmRepository
        name: semaphoreui
        namespace: flux-system
  install:
    remediation:
      retries: 3
  interval: 1m0s
  # Chart docs / default values:
  # https://artifacthub.io/packages/helm/semaphoreui/semaphore
  values: {}
