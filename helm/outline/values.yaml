# Outline ships as a single image whose sub-services are selected via the
# SERVICES env var. To survive node failures and rolling updates without an
# outage we run every service as its own stateless Deployment ("component").
# Nothing here is a StatefulSet: all state lives in Postgres, Redis and S3.
#
#   web           -> app, API, static, websockets /realtime, worker AND cron
#   collaboration -> Hocuspocus realtime editing            (path /collaboration)
#
# websockets (socket.io) and the BullMQ services (worker, cron) do not run
# correctly standalone (websockets has no WEBSOCKETS_URL; an isolated
# worker/cron grows memory unbounded), so they run inside the web component via
# SERVICES="web,websockets,worker,cron". cron duplication across web replicas
# is safe (BullMQ repeatable jobs are idempotent). collaboration scales
# independently. Each container only serves the routes of its own SERVICES, so
# the gateway must route:
#   /collaboration -> <release>-collaboration
#   /              -> <release>-web   (also serves /realtime)
#
# Running collaboration with >1 replica requires Redis sync:
#   - websockets    uses REDIS_URL (socket.io adapter)            -- already set
#   - collaboration needs REDIS_COLLABORATION_URL in the .env secret
# See https://docs.getoutline.com/s/hosting/doc/horizontal-scaling-hkfU5Stao7

# This sets the container image more information can be found here: https://kubernetes.io/docs/concepts/containers/images/
image:
  repository: outlinewiki/outline
  # This sets the pull policy for images.
  pullPolicy: IfNotPresent
  # Overrides the image tag whose default is the chart appVersion.
  tag: "1.8.1"

# This is for the secrets for pulling an image from a private repository more information can be found here: https://kubernetes.io/docs/tasks/configure-pod-container/pull-image-private-registry/
imagePullSecrets: []
# This is to override the chart name.
nameOverride: ""
fullnameOverride: ""

# Scheduling priority applied to every component pod.
priorityClassName: ""

# Extra env vars applied to every component (merged before each component's own extraEnv).
# The SERVICES var is injected automatically per component and must not be set here.
extraEnv: []
# - name: FOO
#   value: bar

# Components are the per-service Deployments. Each runs the same image but a
# different SERVICES subset. Disable a component by setting enabled: false.
# Fields per component:
#   services   (string)  -> value of the SERVICES env var (required)
#   http       (bool)    -> exposes the container port + gets a Service
#   service    (bool)    -> create a Service for this component (defaults to http)
#   replicaCount, strategy, resources, livenessProbe, readinessProbe,
#   autoscaling, pdb, nodeSelector, affinity, tolerations, topologySpreadConstraints
components:
  web:
    enabled: true
    # websockets (socket.io /realtime) and worker do not run correctly
    # standalone (websockets attaches to the web HTTP server with no
    # WEBSOCKETS_URL; an isolated worker grows memory unbounded), so both run
    # inside the web component.
    services: "web,websockets,worker,cron"
    http: true
    service: true
    replicaCount: 2
    strategy:
      type: RollingUpdate
      rollingUpdate:
        maxUnavailable: 0
        maxSurge: 1
    resources:
      limits:
        cpu: 400m
        memory: 600Mi
      requests:
        cpu: 200m
        memory: 400Mi
    livenessProbe:
      initialDelaySeconds: 60
      httpGet:
        path: /_health
        port: http
    readinessProbe:
      initialDelaySeconds: 60
      httpGet:
        path: /_health
        port: http
    autoscaling:
      enabled: false
      minReplicas: 2
      maxReplicas: 6
      targetCPUUtilizationPercentage: 80
    pdb:
      enabled: true
      minAvailable: 1
    topologySpreadConstraints:
      - maxSkew: 1
        topologyKey: kubernetes.io/hostname
        whenUnsatisfiable: ScheduleAnyway
        labelSelector:
          matchLabels:
            app.kubernetes.io/name: outline
            app.kubernetes.io/component: web

  collaboration:
    enabled: true
    services: "collaboration"
    http: true
    service: true
    # >1 replica requires REDIS_COLLABORATION_URL in the .env secret.
    replicaCount: 2
    strategy:
      type: RollingUpdate
      rollingUpdate:
        maxUnavailable: 0
        maxSurge: 1
    resources:
      limits:
        cpu: 400m
        memory: 600Mi
      requests:
        cpu: 200m
        memory: 400Mi
    livenessProbe:
      initialDelaySeconds: 30
      httpGet:
        path: /_health
        port: http
    readinessProbe:
      initialDelaySeconds: 30
      httpGet:
        path: /_health
        port: http
    autoscaling:
      enabled: false
      minReplicas: 2
      maxReplicas: 4
      targetCPUUtilizationPercentage: 80
    pdb:
      enabled: true
      minAvailable: 1
    topologySpreadConstraints:
      - maxSkew: 1
        topologyKey: kubernetes.io/hostname
        whenUnsatisfiable: ScheduleAnyway
        labelSelector:
          matchLabels:
            app.kubernetes.io/name: outline
            app.kubernetes.io/component: collaboration

# Path routing for the built-in chart ingress / httpRoute (both off here; the
# real exposure is the external Cloudflare Tunnel Ingress). Each entry maps a
# request path to the Service of a component.
routes:
  - path: /collaboration
    pathType: Prefix
    component: collaboration
  # web also serves /realtime (socket.io) since it runs the websockets service.
  - path: /
    pathType: Prefix
    component: web

ingress:
  enabled: false
  className: ""
  annotations: { }
  # kubernetes.io/tls-acme: "true"
  hosts:
    - chart-example.local
  tls: [ ]
  #  - secretName: chart-example-tls
  #    hosts:
  #      - chart-example.local

httpRoute:
  enabled: false
  annotations: {}
  parentRefs:
  - name: gateway
    sectionName: http
  hostnames:
  - chart-example.local

# This is for setting up a service more information can be found here: https://kubernetes.io/docs/concepts/services-networking/service/
service:
  # This sets the service type more information can be found here: https://kubernetes.io/docs/concepts/services-networking/service/#publishing-services-service-types
  type: ClusterIP
  # This sets the ports more information can be found here: https://kubernetes.io/docs/concepts/services-networking/service/#field-spec-ports
  port: 3000

metrics:
  enabled: false
  # Which component exposes /metrics (the web process).
  component: web
  path: /metrics
  port: http
  scheme: http
  serviceMonitor:
    enabled: false
    namespace: ""
    additionalLabels: {}
    annotations: {}
    interval: ""
    scrapeTimeout: ""
    relabelings: []
    metricRelabelings: []

# This section builds out the service account more information can be found here: https://kubernetes.io/docs/concepts/security/service-accounts/
serviceAccount:
  # Specifies whether a service account should be created
  create: true
  # Automatically mount a ServiceAccount's API credentials?
  automount: true
  # Annotations to add to the service account
  annotations: {}
  # The name of the service account to use.
  # If not set and create is true, a name is generated using the fullname template
  name: ""

# This is for setting Kubernetes Annotations to a Pod.
# For more information checkout: https://kubernetes.io/docs/concepts/overview/working-with-objects/annotations/
podAnnotations: {}
# This is for setting Kubernetes Labels to a Pod.
# For more information checkout: https://kubernetes.io/docs/concepts/overview/working-with-objects/labels/
podLabels: {}

podSecurityContext: {}
  # fsGroup: 2000

securityContext: {}
  # capabilities:
  #   drop:
  #   - ALL
  # readOnlyRootFilesystem: true
  # runAsNonRoot: true
  # runAsUser: 1000

# Additional volumes on the output Deployment definition.
volumes: []
# - name: foo
#   secret:
#     secretName: mysecret
#     optional: false

# Additional volumeMounts on the output Deployment definition.
volumeMounts: []
# - name: foo
#   mountPath: "/etc/foo"
#   readOnly: true

nodeSelector: {}

tolerations: []

affinity: {}

# Spread component pods across nodes/zones. Applied to every component unless
# overridden per component (see each component above).
topologySpreadConstraints: []
