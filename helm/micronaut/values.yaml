# Default values for micronaut.
# This is a YAML-formatted file.
# Declare variables to be passed into your templates.

# This will set the replicaset count more information can be found here: https://kubernetes.io/docs/concepts/workloads/controllers/replicaset/
replicaCount: 1

# Deployment update strategy. Empty -> Kubernetes default (RollingUpdate 25%/25%).
# For seamless updates with >=2 replicas, set maxUnavailable: 0 / maxSurge: 1.
strategy: {}
  # type: RollingUpdate
  # rollingUpdate:
  #   maxUnavailable: 0
  #   maxSurge: 1

# Scheduling priority. Empty -> cluster default PriorityClass.
priorityClassName: ""

# PodDisruptionBudget for the workload. Disabled by default so single-replica
# apps are unaffected. Set minAvailable OR maxUnavailable (minAvailable wins).
podDisruptionBudget:
  enabled: false
  minAvailable: ""
  maxUnavailable: ""

# This sets the container image more information can be found here: https://kubernetes.io/docs/concepts/containers/images/
image:
  repository: nginx
  # This sets the pull policy for images.
  pullPolicy: IfNotPresent
  # Overrides the image tag whose default is the chart appVersion.
  tag: ""

# This is for the secrets for pulling an image from a private repository more information can be found here: https://kubernetes.io/docs/tasks/configure-pod-container/pull-image-private-registry/
imagePullSecrets: []
# This is to override the chart name.
nameOverride: ""
fullnameOverride: ""

# This section builds out the service account more information can be found here: https://kubernetes.io/docs/concepts/security/service-accounts/
serviceAccount:
  # Specifies whether a service account should be created
  create: true
  # Automatically mount a ServiceAccount's API credentials?
  automount: true
  # Annotations to add to the service account
  annotations: {}
  # The name of the service account to use.
  # If not set and create is true, a name is generated using the fullname template
  name: ""

# RBAC for Micronaut Kubernetes service discovery.
# When enabled, creates a namespace-scoped Role + RoleBinding granting the
# ServiceAccount read access to services and endpoints in the release namespace,
# as required by micronaut-kubernetes-discovery-client. Off by default.
rbac:
  create: false

# This is for setting Kubernetes Annotations to a Pod.
# For more information checkout: https://kubernetes.io/docs/concepts/overview/working-with-objects/annotations/
podAnnotations: {}
# This is for setting Kubernetes Labels to a Pod.
# For more information checkout: https://kubernetes.io/docs/concepts/overview/working-with-objects/labels/
podLabels: {}

podSecurityContext: {}
  # fsGroup: 2000

securityContext: {}
  # capabilities:
  #   drop:
  #   - ALL
  # readOnlyRootFilesystem: true
  # runAsNonRoot: true
  # runAsUser: 1000

# This is for setting up a service more information can be found here: https://kubernetes.io/docs/concepts/services-networking/service/
service:
  # This sets the service type more information can be found here: https://kubernetes.io/docs/concepts/services-networking/service/#publishing-services-service-types
  type: ClusterIP
  # This sets the ports more information can be found here: https://kubernetes.io/docs/concepts/services-networking/service/#field-spec-ports
  port: 80

metrics:
  enabled: false
  path: /prometheus
  port: http
  scheme: http
  serviceMonitor:
    enabled: false
    namespace: ""
    additionalLabels: {}
    annotations: {}
    interval: ""
    scrapeTimeout: ""
    relabelings: []
    metricRelabelings: []

# This block is for setting up the ingress for more information can be found here: https://kubernetes.io/docs/concepts/services-networking/ingress/
ingress:
  enabled: false
  className: ""
  annotations: {}
    # kubernetes.io/ingress.class: nginx
    # kubernetes.io/tls-acme: "true"
  hosts:
    - host: chart-example.local
      paths:
        - path: /
          pathType: ImplementationSpecific
  tls: []
  #  - secretName: chart-example-tls
  #    hosts:
  #      - chart-example.local

httpRoute:
  enabled: false
  annotations: {}
  parentRefs:
  - name: gateway
    sectionName: http
  hostnames:
  - chart-example.local
  rules:
  - matches:
    - path:
        type: PathPrefix
        value: /

resources:
  # We usually recommend not to specify default resources and to leave this as a conscious
  # choice for the user. This also increases chances charts run on environments with little
  # resources, such as Minikube. If you do want to specify resources, uncomment the following
  # lines, adjust them as necessary, and remove the curly braces after 'resources:'.
   limits:
     cpu: 1
     memory: 512Mi
   requests:
     cpu: 100m
     memory: 256Mi

# This is to setup the liveness and readiness probes more information can be found here: https://kubernetes.io/docs/tasks/configure-pod-container/configure-liveness-readiness-startup-probes/
livenessProbe:
  httpGet:
    path: /health
    port: http
readinessProbe:
  httpGet:
    path: /health
    port: http

# This section is for setting up autoscaling more information can be found here: https://kubernetes.io/docs/concepts/workloads/autoscaling/
autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 100
  targetCPUUtilizationPercentage: 80
  # targetMemoryUtilizationPercentage: 80

# Additional volumes on the output Deployment definition.
volumes: []
# - name: foo
#   secret:
#     secretName: mysecret
#     optional: false

# Additional volumeMounts on the output Deployment definition.
volumeMounts: []
# - name: foo
#   mountPath: "/etc/foo"
#   readOnly: true

nodeSelector: {}

tolerations: []

affinity: {}

# Specific
profiles: ["prod"]  # This is for setting up the Micronaut application profiles.

# This section is for setting up the Micronaut application configuration.
config:
  base: |-
    micronaut:
      application:
        name: your-mn-app
  profiles:
    prod: |-
      # application-prod.yml
      logger:
        levels:
          root: INFO
    feature-x: |-
      # application-feature-x.yml
      feature:
        x: true

secrets:
  enabled: false
  files: {}
  # Example:
  # files:
  #   prod: |-
  #     datasource:
  #       username: ${DB_USER}
  #       password: ${DB_PASS}

# Environment-Variablen
env:
  - name: JAVA_TOOL_OPTIONS
    value: "-XX:MaxRAMPercentage=75.0 -Duser.timezone=UTC"

envFrom: []

# Traces-only OTel Java agent instrumentation. Metrics/logs already flow via
# the chart's own Prometheus scrape (metrics.serviceMonitor) and container
# stdout shipping, so only OTEL_TRACES_EXPORTER is enabled here to avoid
# duplicating either. An initContainer copies the javaagent jar out of the
# upstream image into an emptyDir the main container mounts read-only --
# no OpenTelemetry Operator/CRDs involved, just the jar-holder image it publishes.
tracing:
  enabled: false
  # Matches the tempo-gateway target already used by EnvoyProxy's native
  # tracing and the alloy-receiver OTLP gateway elsewhere in this cluster.
  endpoint: http://tempo-gateway.grafana.svc.cluster.local:4317
  image: ghcr.io/open-telemetry/opentelemetry-operator/autoinstrumentation-java:1.33.6
  resources:
    requests:
      cpu: 10m
      memory: 32Mi
    limits:
      cpu: 100m
      memory: 64Mi

containerSecurityContext:
  enabled: true
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: true
  capabilities:
    drop: ["ALL"]
