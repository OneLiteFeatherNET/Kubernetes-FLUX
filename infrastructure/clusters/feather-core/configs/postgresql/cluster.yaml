apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  name: feather-core-cluster-pg
  namespace: cnpg-system
spec:
  instances: 3
  imageName: ghcr.io/cloudnative-pg/postgresql:17
  postgresql:
    parameters:
      # Raised from the CNPG default (100): the shared cluster sits at saturation
      # (large idle pools, esp. harbor ~26 + dependency-track ~23), which starves
      # apps of connection slots during restart storms. Memory bumped in lockstep
      # below (~5-10MB/backend). See the postgres-connection-saturation memory note;
      # the proper fix is pooler adoption + trimming idle pools.
      max_connections: "200"
  storage:
    size: 75Gi
    storageClass: ceph-rbd-fr01
  # Memory request==limit for OOM safety; raised 1Gi -> 2Gi to cover
  # max_connections=200 (each backend ~5-10MB). CPU request only (no CPU limit
  # to avoid throttling the DB).
  resources:
    requests:
      cpu: 250m
      memory: 2Gi
    limits:
      cpu: "2"
      memory: 2Gi
  enableSuperuserAccess: true
  priorityClassName: feather-platform
  affinity:
    nodeSelector:
      topology.kubernetes.io/zone: fr01
    podAntiAffinityType: preferred
  managed:
    roles:
      - name: harbor
        login: true
        ensure: present
        passwordSecret:
          name: role-harbor
      - name: otis
        login: true
        ensure: present
        passwordSecret:
          name: role-otis
      - name: otis_dev
        login: true
        ensure: present
        passwordSecret:
          name: role-otis-dev
      - name: vulpes
        login: true
        ensure: present
        passwordSecret:
          name: role-vulpes
      - name: vulpes_dev
        login: true
        ensure: present
        passwordSecret:
          name: role-vulpes-dev
      - name: outline
        login: true
        ensure: present
        passwordSecret:
          name: role-outline
      - name: dependency-track
        login: true
        ensure: present
        passwordSecret:
          name: role-dependency-track
      - name: backstage
        login: true
        ensure: present
        passwordSecret:
          name: role-backstage
      - name: grafana
        login: true
        ensure: present
        passwordSecret:
          name: role-grafana
      - name: n8n
        login: true
        ensure: present
        passwordSecret:
          name: role-n8n
      - name: plane
        login: true
        ensure: present
        passwordSecret:
          name: role-plane
    services:
      additional:
        - selectorType: rw
          serviceTemplate:
            metadata:
              name: "feather-core-cluster-pg-rw-external"
              annotations:
                metallb.io/loadBalancerIPs: 10.200.90.3
            spec:
              type: LoadBalancer
  plugins:
    - name: barman-cloud.cloudnative-pg.io
      isWALArchiver: true
      parameters:
        barmanObjectName: s3-store
