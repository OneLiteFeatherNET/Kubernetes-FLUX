apiVersion: postgresql.cnpg.io/v1
kind: Pooler
metadata:
  name: feather-core-cluster-pg-pooler-rw
  namespace: cnpg-system
spec:
  cluster:
    name: feather-core-cluster-pg
  type: rw
  instances: 2
  pgbouncer:
    poolMode: session
    parameters:
      # Default max_client_conn (100) was exhausted by Harbor's oversized pool,
      # blocking new client connections (harbor + dependency-track share this rw
      # pooler). Client conns are cheap in pgbouncer; raise the ceiling. Server
      # conns stay bounded by default_pool_size per (user,db) pool — aligned to
      # Harbor's maxOpenConns (25); a few pools * 25 stays well under PG's 200.
      max_client_conn: "400"
      default_pool_size: "25"
  template:
    spec:
      priorityClassName: feather-high
      containers:
        - name: pgbouncer
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              memory: 128Mi
