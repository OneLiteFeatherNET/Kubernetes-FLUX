apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: cnpg-system
generatorOptions:
  disableNameSuffixHash: true
resources:
  - cluster.yaml
  - podmonitor.yaml
  - object-store.yaml
  - backup.yaml
  - scheduled-backup.yaml
  - pooler-rw.yaml
  - pooler-ro.yaml
  - database/harbor.yaml
  - database/outline.yaml
  - database/otis.yaml
  - database/otis-dev.yaml
  - database/vulpes.yaml
  - database/vulpes-dev.yaml
  - database/backstage.yaml
  - database/dependency-track.yaml
  - database/grafana.yaml
  - database/n8n.yaml
  - database/plane.yaml

secretGenerator:
  - name: cnpg-backup
    envs:
      - s3-backup.env
  - name: role-otis
    options:
      labels:
        cnpg.io/reload: "true"
    envs:
      - roles/otis.sops.env
  - name: role-otis-dev
    options:
      labels:
        cnpg.io/reload: "true"
    envs:
      - roles/otis-dev.sops.env
  - name: role-vulpes
    options:
      labels:
        cnpg.io/reload: "true"
    envs:
      - roles/vulpes.sops.env
  - name: role-vulpes-dev
    options:
      labels:
        cnpg.io/reload: "true"
    envs:
      - roles/vulpes-dev.sops.env
  - name: role-outline
    options:
      labels:
        cnpg.io/reload: "true"
    envs:
      - roles/outline.sops.env
  - name: role-harbor
    options:
      labels:
        cnpg.io/reload: "true"
    envs:
      - roles/harbor.sops.env
  - name: role-backstage
    options:
      labels:
        cnpg.io/reload: "true"
    envs:
      - roles/backstage.sops.env
  - name: role-dependency-track
    options:
      labels:
        cnpg.io/reload: "true"
    envs:
      - roles/dependency-track.sops.env
  - name: role-grafana
    options:
      labels:
        cnpg.io/reload: "true"
    envs:
      - roles/grafana.sops.env
  - name: role-n8n
    options:
      labels:
        cnpg.io/reload: "true"
    envs:
      - roles/n8n.sops.env
  - name: role-plane
    options:
      labels:
        cnpg.io/reload: "true"
    envs:
      - roles/plane.sops.env
