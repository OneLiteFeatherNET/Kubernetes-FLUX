apiVersion: postgresql.cnpg.io/v1
kind: Pooler
metadata:
  name: feather-core-cluster-pg-pooler-ro
  namespace: cnpg-system
spec:
  cluster:
    name: feather-core-cluster-pg
  type: ro
  instances: 2
  pgbouncer:
    poolMode: session
    parameters: {}
  template:
    spec:
      containers:
        - name: pgbouncer
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              memory: 128Mi
