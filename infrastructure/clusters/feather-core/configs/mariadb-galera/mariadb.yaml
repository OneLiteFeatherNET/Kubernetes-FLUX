apiVersion: k8s.mariadb.com/v1alpha1
kind: MariaDB
metadata:
  name: mariadb-galera
  namespace: mariadb-galera
#  annotations:
#    kustomize.toolkit.fluxcd.io/reconcile: disabled
spec:
  image: "mariadb:11.8.5"
#  podSecurityContext:
#    seccompProfile:
#      type: RuntimeDefault
#  securityContext:
#    allowPrivilegeEscalation: false
#    capabilities:
#      drop:
#        - ALL
  replicas: 3
  startupProbe:
    failureThreshold: 60
    periodSeconds: 10
  galera:
    enabled: true
    recovery:
      enabled: true
      minClusterSize: 1
      clusterHealthyTimeout: 10m
      clusterBootstrapTimeout: 20m
      podRecoveryTimeout: 10m
      podSyncTimeout: 10m
    availableWhenDonor: true
    replicaThreads: 4
  tls:
    enabled: true
  myCnf: |
    [mariadb]
    bind-address=*
    default_storage_engine=InnoDB
    binlog_format=row
    innodb_autoinc_lock_mode=2

    # === Constraint: I/O path ===
    innodb_buffer_pool_size=5G
    innodb_buffer_pool_size_max=8G        # read-only at runtime, set generously now!
    innodb_buffer_pool_dump_at_shutdown=1 # dump page numbers on shutdown
    innodb_buffer_pool_load_at_startup=1  # warm up the buffer pool after pod restarts
    innodb_flush_log_at_trx_commit=2      # safe with Galera (cluster guarantees consistency)
    innodb_flush_method=O_DIRECT          # skip double-buffering through the OS page cache
    innodb_log_file_size=1G               # ~1/4 of buffer pool, fewer checkpoints, less disk I/O
    innodb_log_buffer_size=64M            # less disk I/O for larger transactions

    # === Cleanup (subordination, step 3) ===
    max_connections=500                    # instead of 100000
    max_allowed_packet=256M               # instead of 1GB
    tmp_table_size=64M
    max_heap_table_size=64M

    # === Diagnostics at the constraint ===
    slow_query_log=1
    long_query_time=1                     # log everything slower than 1s
    log_slow_verbosity=query_plan,explain
  affinity:
    antiAffinityEnabled: true
    nodeAffinity:
      requiredDuringSchedulingIgnoredDuringExecution:
        nodeSelectorTerms:
          - matchExpressions:
              - key: topology.kubernetes.io/zone
                operator: In
                values:
                  - fr01
  # When draining Nodes, make sure that you have at least 2 Pods available.
  podDisruptionBudget:
    maxUnavailable: 33%
  maxScaleRef:
    name: maxscale-galera

  # Ensure that the Pods are not preempted by Kubernetes to make room for new scheduled Pods.
  priorityClassName: system-node-critical
  # Configure enough compute resources. This is just an example, take a look at your historic compute metrics to estimate.
  resources:
    requests:
      cpu: "2"
      memory: 8Gi
    limits:
      memory: 8Gi

  storage:
    resizeInUseVolumes: true
    waitForVolumeResize: true
    size: 50Gi
    storageClassName: ceph-rbd-fr01
    volumeClaimTemplate:
      accessModes:
        - ReadWriteOnce
      resources:
        requests:
          storage: 50Gi
      storageClassName: ceph-rbd-fr01

  bootstrapFrom:
    backupContentType: Physical
    s3:
      bucket: mariadb-galera-backup
      prefix: feather-core-backups
      endpoint: rook-ceph-rgw-feather-s3.rook-ceph-fr01.svc:80
      tls:
        enabled: false
      accessKeyIdSecretKeyRef:
        name: mariadb
        key: access-key-id
      secretAccessKeySecretKeyRef:
        name: mariadb
        key: secret-access-key

  rootPasswordSecretKeyRef:
    name: mariadb
    key: password
#  service:
#    type: LoadBalancer
#    metadata:
#      annotations:
#        metallb.io/loadBalancerIPs: 10.200.32.4
  metrics:
    enabled: true
    exporter:
      resources:
        requests:
          cpu: 10m
          memory: 32Mi
        limits:
          memory: 64Mi
    serviceMonitor:
      prometheusRelease: kube-prometheus-stack
      jobLabel: mariadb-galera
      interval: 30s
      scrapeTimeout: 10s
    username: monitoring
    passwordSecretKeyRef:
      name: user-monitoring-secret
      key: password
