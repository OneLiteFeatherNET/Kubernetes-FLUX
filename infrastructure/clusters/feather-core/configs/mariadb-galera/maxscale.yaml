apiVersion: k8s.mariadb.com/v1alpha1
kind: MaxScale
metadata:
  name: maxscale-galera
  namespace: mariadb-galera
spec:
  mariaDbRef:
    name: mariadb-galera
  # 2 replicas for node-level redundancy (HA): if one node fails, the other
  # MaxScale pod keeps serving the rw-router VIP.
  replicas: 2
  # Stateful core tier (databases / MariaDB / MaxScale) per the cluster
  # priority-class scheme. Immutable on MaxScale, so it is only applied on a
  # fresh CR — see the recreation note below.
  priorityClassName: feather-platform

  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      memory: 256Mi

  # Spread the 2 MaxScale replicas across nodes, but only against each other
  # (preferred/soft) — NOT against MariaDB, since there aren't enough nodes to
  # keep MaxScale and MariaDB fully separated. antiAffinityEnabled would make
  # it a HARD rule against both maxscale + mariadb, over-constraining the 4
  # DB-eligible workers (3 MariaDB already occupy 3 of them) and leaving the
  # 2nd MaxScale pod Pending.
  #
  # IMPORTANT: spec.affinity.antiAffinityEnabled is immutable (webhook-enforced).
  # Going from antiAffinityEnabled:true to this soft rule — and setting
  # priorityClassName above — requires RECREATING the MaxScale CR:
  #   kubectl delete maxscale maxscale-galera -n mariadb-galera
  # Flux then re-applies this manifest fresh (brief rw-router VIP blip).
  affinity:
    podAntiAffinity:
      preferredDuringSchedulingIgnoredDuringExecution:
        - weight: 100
          podAffinityTerm:
            labelSelector:
              matchExpressions:
                - key: app.kubernetes.io/instance
                  operator: In
                  values:
                    - maxscale-galera
            topologyKey: kubernetes.io/hostname

  monitor:
    name: mariadb-monitor
    module: galeramon
    interval: 2s
    cooperativeMonitoring: majority_of_all
    params:
      disable_master_failback: "false"
      available_when_donor: "false"
      disable_master_role_setting: "false"

  services:
    - name: rw-router
      router: readwritesplit
      listener:
        port: 3306
      params:
        # === Failover resilience (the important part) ===
        transaction_replay: "true"            # replay interrupted transactions on the new primary
        transaction_replay_timeout: "30s"     # give up replaying after 30s
        master_reconnection: "true"           # migrate session to new primary instead of killing it
        master_failure_mode: "fail_on_write"  # keep read-only sessions alive when primary is down
        delayed_retry: "true"                 # queue queries briefly while no primary is available
        delayed_retry_timeout: "10s"

        # === Connection hygiene ===
        connection_keepalive: "240s"          # ping idle backend connections (align with Hikari maxLifetime!)
        prune_sescmd_history: "true"          # cap session command history memory

        # === Routing quality ===
        slave_selection_criteria: "ADAPTIVE_ROUTING"  # route reads by measured response time
        master_accept_reads: "true"           # primary may serve reads too (sane for 3-node Galera)

  config:
    sync:
      database: mysql
      interval: 5s
      timeout: 10s

  kubernetesService:
    type: LoadBalancer
    externalTrafficPolicy: Local
    metadata:
      annotations:
        metallb.io/loadBalancerIPs: 10.200.90.4

  guiKubernetesService:
    type: LoadBalancer
    externalTrafficPolicy: Local
    metadata:
      annotations:
        metallb.io/loadBalancerIPs: 10.200.90.7

  metrics:
    enabled: true
    exporter:
      resources:
        requests:
          cpu: 10m
          memory: 32Mi
        limits:
          memory: 64Mi
    serviceMonitor:
      prometheusRelease: kube-prometheus-stack
      jobLabel: maxscale-galera
      interval: 30s
      scrapeTimeout: 10s