apiVersion: k8s.mariadb.com/v1alpha1
kind: PhysicalBackup
metadata:
  name: mariadb-galera-backup
  namespace: mariadb-galera
spec:
  mariaDbRef:
    name: mariadb-galera
  schedule:
    cron: "0 */6 * * *"
    suspend: false
    immediate: true
  maxRetention: 720h # 30 days
  # Speed test: bzip2 took ~60-67min/run (compression-bound); switched to gzip,
  # still >7min into compression alone on the first run. Trying "none" now to
  # measure pure dump+upload time and see how close that gets to a 5-15min
  # target - compression choice is otherwise the only speed lever this CRD
  # exposes (no level control, no zstd/pigz). Trade-off if kept: larger,
  # uncompressed backups in S3, more storage cost at 30-day retention.
  compression: none
  storage:
    s3:
      bucket: mariadb-galera-backup
      prefix: feather-core-backups
      endpoint: rook-ceph-rgw-feather-s3.rook-ceph-fr01.svc:80
      tls:
        enabled: false
      accessKeyIdSecretKeyRef:
        name: mariadb
        key: access-key-id
      secretAccessKeySecretKeyRef:
        name: mariadb
        key: secret-access-key
  # emptyDir staging area on the target Pod's Node: the operator wipes it after
  # each backup completes, unlike a PVC which keeps accumulating .xb files
  # forever (no built-in cleanup upstream, see mariadb-operator issue #1243).
  # fr01-wrk-xl-01 (where podAffinity pins this Job) has ~244Gi ephemeral-storage
  # free; largest bzip2 backup observed was ~28Gi (uncompressed will be larger,
  # watch this doesn't exceed the sizeLimit below).
  stagingStorage:
    volume:
      emptyDir:
        sizeLimit: 100Gi
  timeout: 2h
  # Disabled: hard podAffinity pins the backup Pod onto the primary's Node
  # (mariadb-galera-0 on a saturated general worker), leaving it Pending.
  # The backup streams over the network, so co-location is not required.
  podAffinity: true
  #  serviceAccountName: backup
  resources:
    requests:
      cpu: 500m
      memory: 1Gi
    limits:
      cpu: 2
      memory: 4Gi