apiVersion: k8s.mariadb.com/v1alpha1
kind: PhysicalBackup
metadata:
  name: mariadb-galera-backup
  namespace: mariadb-galera
spec:
  mariaDbRef:
    name: mariadb-galera
  schedule:
    cron: "0 */6 * * *"
    suspend: false
    immediate: true
  maxRetention: 720h # 30 days
  # No compression, deliberately: the operator's pipeline is sequential
  # (dump -> compress -> upload, not streamed), so compression algorithm was
  # the entire bottleneck. Measured on this cluster: bzip2 ~60-67min/run,
  # gzip 22m12s/6.8GiB, none 4m18s/28.6GiB. "none" was chosen to hit a
  # 5-15min backup window; trade-off is ~4.2x more S3 storage per backup
  # than gzip (~3.4TiB vs ~816GiB at 4 backups/day * 30-day maxRetention).
  compression: none
  storage:
    s3:
      bucket: mariadb-galera-backup
      prefix: feather-core-backups
      endpoint: rook-ceph-rgw-feather-s3.rook-ceph-fr01.svc:80
      tls:
        enabled: false
      accessKeyIdSecretKeyRef:
        name: mariadb
        key: access-key-id
      secretAccessKeySecretKeyRef:
        name: mariadb
        key: secret-access-key
  # emptyDir staging area on the target Pod's Node: the operator wipes it after
  # each backup completes, unlike a PVC which keeps accumulating .xb files
  # forever (no built-in cleanup upstream, see mariadb-operator issue #1243).
  # fr01-wrk-xl-01 (where podAffinity pins this Job) has ~244Gi ephemeral-storage
  # free; measured uncompressed backup size is ~28.6Gi, comfortable margin
  # under the 100Gi sizeLimit below.
  stagingStorage:
    volume:
      emptyDir:
        sizeLimit: 100Gi
  timeout: 2h
  # Disabled: hard podAffinity pins the backup Pod onto the primary's Node
  # (mariadb-galera-0 on a saturated general worker), leaving it Pending.
  # The backup streams over the network, so co-location is not required.
  podAffinity: true
  #  serviceAccountName: backup
  resources:
    requests:
      cpu: 500m
      memory: 1Gi
    limits:
      cpu: 2
      memory: 4Gi