apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - gateway-class.yaml
  - certificates.yaml
  # Internal-host (*.apps.onelite.feather) step-ca certs are managed
  # by the separate wait:false `internal-certs` Kustomization
  # (clusters/feather-core/internal-certs.yaml) so async step-ca
  # issuance never blocks the configs Kustomization (wait:true).
  - envoyproxy.yaml
  - gateway.yaml
  - redirect-route.yaml
