apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: https-redirect
  namespace: envoy
spec:
  parentRefs:
    - name: eg
      sectionName: http
  rules:
    # Global HTTP->HTTPS redirect (replaces nginx ssl-redirect annotations).
    # cert-manager HTTP01 solver attaches a more specific
    # /.well-known/acme-challenge/ HTTPRoute which takes precedence.
    - filters:
        - type: RequestRedirect
          requestRedirect:
            scheme: https
            statusCode: 301
