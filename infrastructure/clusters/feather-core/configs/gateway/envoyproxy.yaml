apiVersion: gateway.envoyproxy.io/v1alpha1
kind: EnvoyProxy
metadata:
  name: eg-proxy
  namespace: envoy
spec:
  provider:
    type: Kubernetes
    kubernetes:
      # Run the Envoy data plane as a DaemonSet (one pod per node) -
      # parity with the replaced ingress-nginx DaemonSet. With
      # externalTrafficPolicy: Local + MetalLB BGP this makes every
      # node announce 10.200.90.1, so the external reverse-proxy path
      # reaches the gateway on any node (and client source IP is kept).
      envoyDaemonSet:
        pod:
          priorityClassName: feather-platform
        container:
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              memory: 768Mi
      envoyService:
        externalTrafficPolicy: Local
        annotations:
          metallb.io/loadBalancerIPs: "10.200.90.1"
        labels:
          onelite.feather/bgp: "announce"
  telemetry:
    tracing:
      # 10% sampling: this gateway fronts every ingress route in the
      # cluster, so 100% would multiply the trace volume that already
      # OOM-killed tempo-ingester once this session from a single
      # low-traffic source. Raise if you need finer-grained visibility.
      samplingRate: 10
      provider:
        type: OpenTelemetry
        # host/port (not backendRefs) to avoid a cross-namespace
        # ReferenceGrant from envoy -> grafana for a plain internal sink.
        host: tempo-gateway.grafana.svc.cluster.local
        port: 4317
