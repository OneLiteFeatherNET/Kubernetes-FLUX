apiVersion: v1
kind: ConfigMap
metadata:
  name: redis-master-proxy
  labels:
    app: redis-master-proxy
data:
  haproxy.cfg: |
    global
      log stdout format raw local0 info
      maxconn 4096
    defaults
      mode tcp
      log global
      option tcplog
      timeout connect 3s
      timeout client 1h
      timeout server 1h
      retries 3
    frontend redis_fe
      bind :6379
      default_backend redis_be
    backend redis_be
      # Only the node that answers INFO replication with role:master
      # passes the health check, so traffic always lands on the
      # current master. On Sentinel failover the new master starts
      # passing and the old one fails -> traffic follows automatically.
      option tcp-check
      tcp-check connect
      tcp-check send AUTH\ "${REDIS_PASSWORD}"\r\n
      tcp-check expect string +OK
      tcp-check send PING\r\n
      tcp-check expect string +PONG
      tcp-check send info\ replication\r\n
      tcp-check expect string role:master
      tcp-check send QUIT\r\n
      tcp-check expect string +OK
      server redis-node-0 redis-node-0.redis-headless.redis.svc.cluster.local:6379 check inter 1s fall 2 rise 2
      server redis-node-1 redis-node-1.redis-headless.redis.svc.cluster.local:6379 check inter 1s fall 2 rise 2
      server redis-node-2 redis-node-2.redis-headless.redis.svc.cluster.local:6379 check inter 1s fall 2 rise 2
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: redis-master-proxy
  labels:
    app: redis-master-proxy
spec:
  replicas: 2
  selector:
    matchLabels:
      app: redis-master-proxy
  template:
    metadata:
      labels:
        app: redis-master-proxy
      annotations:
        checksum/config: "haproxy-redis-master-v1"
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 99
        fsGroup: 99
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: kubernetes.io/hostname
          whenUnsatisfiable: ScheduleAnyway
          labelSelector:
            matchLabels:
              app: redis-master-proxy
      containers:
        - name: haproxy
          image: haproxy:3.0-alpine
          env:
            - name: REDIS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: redis-password-secret
                  key: redis-password
          ports:
            - name: redis
              containerPort: 6379
          livenessProbe:
            tcpSocket:
              port: redis
            initialDelaySeconds: 5
            periodSeconds: 10
          readinessProbe:
            tcpSocket:
              port: redis
            initialDelaySeconds: 3
            periodSeconds: 5
          resources:
            requests:
              cpu: 25m
              memory: 32Mi
            limits:
              cpu: 250m
              memory: 128Mi
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          volumeMounts:
            - name: cfg
              mountPath: /usr/local/etc/haproxy
              readOnly: true
      volumes:
        - name: cfg
          configMap:
            name: redis-master-proxy
---
apiVersion: v1
kind: Service
metadata:
  name: redis-master-proxy
  labels:
    app: redis-master-proxy
spec:
  type: ClusterIP
  selector:
    app: redis-master-proxy
  ports:
    - name: redis
      port: 6379
      targetPort: redis
