apiVersion: v1
kind: Service
metadata:
  name: dragonfly-master-lb
  namespace: dragonfly
  annotations:
    # Reuse the external IP the old Bitnami redis master used (freed when the
    # bitnami redis was decommissioned). Clients keep the same host:port.
    metallb.io/loadBalancerIPs: "10.200.90.5"
spec:
  type: LoadBalancer
  # Pin a stable VIP from the metallb pool (no IP churn on recreate).
  loadBalancerIP: 10.200.90.5
  # Master-only: the dragonfly-operator maintains `role: master` on exactly one
  # pod and moves the label to the new master on failover, so this LB always
  # points at the current write master (never a read-only replica).
  selector:
    app: dragonfly
    role: master
  ports:
    - name: redis
      port: 6379
      targetPort: 6379
      protocol: TCP
