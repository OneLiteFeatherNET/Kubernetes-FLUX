---
apiVersion: ceph.rook.io/v1
kind: CephObjectStore
metadata:
  name: feather-s3
  namespace: rook-ceph-fr01
spec:
  metadataPool:
    failureDomain: host
    replicated:
      size: 3
      requireSafeReplicaSize: true
  dataPool:
    failureDomain: host
    replicated:
      size: 3
      requireSafeReplicaSize: true
  preservePoolsOnDelete: true
  hosting:
    # advertiseEndpoint is used by the Rook operator for RGW admin-ops calls
    # (user/bucket reconcile) and must be reachable from inside the cluster.
    # The external name belongs in dnsNames only; omitting advertiseEndpoint
    # makes Rook default to the internal RGW service. Setting it to the external
    # s3.onelitefeather.net caused all CephObjectStoreUser reconciles to time out
    # (no NAT hairpin to the public IP). Virtual-host-style still works via the
    # Envoy gateway + s3-proxy HTTPRoute, driven by rgw_dns_name from dnsNames.
    #
    # A host must be listed here for RGW to treat it as PATH-STYLE; any host not
    # in dnsNames (nor an internal RGW service name Rook adds automatically) is
    # parsed as virtual-host-style with the whole hostname as the bucket name.
    # Hence the path-style endpoints below must be present:
    #   - s3-path.onelitefeather.net   external path-style via Cloudflare Tunnel
    #   - s3.apps.onelite.feather      internal path-style via the Envoy gateway
    dnsNames:
      - s3.onelitefeather.net
      - s3-path.onelitefeather.net
      - s3.apps.onelite.feather
  gateway:
    port: 80
    instances: 3
    # Beast's own idle-keepalive default (request_timeout_ms) is 65s. In-cluster
    # clients that talk to the RGW Service directly (bypassing the Cloudflare
    # Tunnel entirely, e.g. reposilite) can hit the same cold-reconnect pattern
    # observed on the tunnel path once their pooled connection sits idle past
    # that. Raised to 10m to match the tunnel-side fix (PR #67).
    # NOTE: rgwCommandFlags replaces the whole --rgw-frontends value and
    # restarts all RGW pods on change — port=80 must stay in sync with
    # spec.gateway.port above.
    rgwCommandFlags:
      rgw_frontends: "beast port=80 request_timeout_ms=650000"
    placement:
      nodeAffinity:
        requiredDuringSchedulingIgnoredDuringExecution:
          nodeSelectorTerms:
            - matchExpressions:
                - key: node-role.feather/workload-class
                  operator: In
                  values:
                    - storage
      tolerations:
        - key: node-role.feather/storage
          operator: Equal
          value: "true"
          effect: NoSchedule
    resources:
      limits:
        memory: 2Gi
      requests:
        cpu: 100m
        memory: 1Gi
