apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: cnpg
  namespace: cnpg-system
spec:
  chart:
    spec:
      version: "=0.27.1"
  values:
    resources:
      requests:
        cpu: 50m
        memory: 128Mi
      limits:
        memory: 256Mi
    config:
      data:
        CNPG_INCLUDE_PLUGINS: "barman-cloud.cloudnative-pg.io"
        INCLUDE_PLUGINS: "barman-cloud.cloudnative-pg.io"