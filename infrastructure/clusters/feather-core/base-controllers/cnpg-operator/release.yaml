apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: cnpg
  namespace: cnpg-system
spec:
  chart:
    spec:
      version: "=0.27.1"
  values:
    resources:
      requests:
        cpu: 50m
        memory: 128Mi
      limits:
        memory: 256Mi
    config:
      data:
        CNPG_INCLUDE_PLUGINS: "barman-cloud.cloudnative-pg.io"
        INCLUDE_PLUGINS: "barman-cloud.cloudnative-pg.io"
    # Alloy discovers PodMonitors cluster-wide, same as spegel/mariadb-galera.
    # Enables scraping the operator's own controller-runtime metrics
    # (controller_runtime_*, workqueue_*, etc. on the "metrics" port/8080)
    # in addition to the already-scraped per-cluster cnpg_* exporter.
    monitoring:
      podMonitorEnabled: true