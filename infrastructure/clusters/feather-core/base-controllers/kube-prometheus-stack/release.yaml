apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: kube-prometheus-stack
  namespace: monitoring
spec:
  values:
    fullnameOverride: kube-prometheus-stack
    grafana:
      enabled: false
    alertmanager:
      alertmanagerSpec:
        replicas: 2
        podAntiAffinity: hard
        storage:
          volumeClaimTemplate:
            spec:
              accessModes:
                - ReadWriteOnce
              resources:
                requests:
                  storage: 10Gi
              storageClassName: rook-external-rbd
    prometheus:
      ingress:
        enabled: true
        ingressClassName: nginx
        annotations:
          cert-manager.io/cluster-issuer: step-ca
        hosts:
          - prometheus.apps.onelite.feather
        paths:
          - /
        pathType: Prefix
        tls:
          - secretName: prometheus-apps-onelite-feather-tls
            hosts:
              - prometheus.apps.onelite.feather
      prometheusSpec:
        externalUrl: https://prometheus.apps.onelite.feather
        replicas: 2
        podAntiAffinity: hard
        podMonitorNamespaceSelector: {}
        podMonitorSelectorNilUsesHelmValues: false
        serviceMonitorNamespaceSelector: {}
        serviceMonitorSelectorNilUsesHelmValues: false
        externalLabels:
          cluster: feather-core
        storageSpec:
          volumeClaimTemplate:
            spec:
              accessModes:
                - ReadWriteOnce
              resources:
                requests:
                  storage: 50Gi
              storageClassName: rook-external-rbd
