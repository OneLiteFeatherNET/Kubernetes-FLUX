apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: kube-prometheus-stack
  namespace: monitoring
spec:
  values:
    fullnameOverride: kube-prometheus-stack
    grafana:
      enabled: false
    alertmanager:
      enabled: false
    prometheus:
      agentMode: true
      ingress:
        enabled: false
      prometheusSpec:
        replicas: 2
        resources:
          requests:
            cpu: 250m
            memory: 1536Mi
          limits:
            cpu: "2"
            memory: 2560Mi
        replicaExternalLabelName: __replica__
        podAntiAffinity: hard
        podMonitorNamespaceSelector: {}
        podMonitorSelectorNilUsesHelmValues: false
        serviceMonitorNamespaceSelector: {}
        serviceMonitorSelectorNilUsesHelmValues: false
        externalLabels:
          cluster: feather-core
        remoteWrite:
          - url: http://mimir-gateway.grafana.svc.cluster.local/api/v1/push
            sendExemplars: true
            queueConfig:
              capacity: 10000
              minShards: 4
              maxShards: 20
              maxSamplesPerSend: 5000
    prometheusOperator:
      resources:
        requests:
          cpu: 20m
          memory: 64Mi
        limits:
          memory: 128Mi
      prometheusConfigReloader:
        resources:
          requests:
            cpu: 10m
            memory: 32Mi
          limits:
            memory: 64Mi
    kube-state-metrics:
      resources:
        requests:
          cpu: 20m
          memory: 64Mi
        limits:
          memory: 128Mi
    prometheus-node-exporter:
      resources:
        requests:
          cpu: 20m
          memory: 32Mi
        limits:
          memory: 64Mi
