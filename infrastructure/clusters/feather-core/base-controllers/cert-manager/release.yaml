apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: cert-manager
  namespace: cert-manager
spec:
  chart:
    spec:
      version: ">=1.14.4"
  values:
    affinity:
      nodeAffinity:
        preferredDuringSchedulingIgnoredDuringExecution:
          - weight: 100
            preference:
              matchExpressions:
                - key: topology.kubernetes.io/region
                  operator: In
                  values:
                    - fr-rosenau
    # cert-manager >=1.15 enables Gateway API via file-based config, NOT the
    # old ExperimentalGatewayAPISupport feature gate (a no-op since 1.15, which
    # left HTTP-01 gatewayHTTPRoute challenges failing with "gateway api is not
    # enabled"). The Gateway API CRDs must exist before the controller starts
    # (provided by the envoy-crds base controller); Helm rolls the controller on
    # this config change so the startup check picks them up.
    config:
      apiVersion: controller.config.cert-manager.io/v1alpha1
      kind: ControllerConfiguration
      enableGatewayAPI: true
    crds:
      enabled: true
    global:
       priorityClassName: system-cluster-critical
    prometheus:
      enabled: true
      podmonitor:
        enabled: true
    strategy:
      type: RollingUpdate
      rollingUpdate:
        maxSurge: 0
        maxUnavailable: 1
    resources:
      limits:
        cpu: "40m"
        memory: "80Mi"
      requests:
        cpu: "20m"
        memory: "40Mi"
    webhook:
      resources:
        limits:
          cpu: "10m"
          memory: "25Mi"
        requests:
          cpu: "5m"
          memory: "15Mi"
    cainjector:
      resources:
        limits:
          cpu: "50m"
          memory: "100Mi"
        requests:
          cpu: "30m"
          memory: "50Mi"
