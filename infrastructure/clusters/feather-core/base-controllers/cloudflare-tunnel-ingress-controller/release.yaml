apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: cloudflare-tunnel-ingress-controller
  namespace: cloudflare-tunnel-ingress-controller
spec:
  chart:
    spec:
      version: ">=0.0.23"
  values:
    # HA: two controller replicas in active/standby. Leader election ensures
    # only one reconciles Cloudflare at a time (mandatory with replicaCount > 1,
    # else the replicas fight over tunnel config / DNS records).
    replicaCount: 2
    leaderElection:
      enabled: true
    # Cloudflare credentials are sourced from the SOPS-managed Secret
    # generated by this kustomization (see kustomization.yaml secretGenerator).
    # Keys must match: account_id / tunnel_name / api_token.
    cloudflare:
      secretRef:
        name: cloudflare-tunnel-credentials
        accountIDKey: account_id
        tunnelNameKey: tunnel_name
        apiTokenKey: api_token
    priorityClassName: feather-platform
    resources:
      requests:
        cpu: 50m
        memory: 64Mi
      limits:
        cpu: 100m
        memory: 128Mi
    cloudflared:
      # Two cloudflared connector pods for tunnel redundancy. NOTE: the connector
      # Deployment is generated by the controller (not Helm) with a minimal pod
      # spec and reconciled every ~10s, so its node-spreading cannot be enforced
      # via config — it relies on the default scheduler's soft spread. Only the
      # controller pods get explicit pod anti-affinity (below).
      replicaCount: 2
      resources:
        requests:
          cpu: 50m
          memory: 64Mi
        limits:
          cpu: 200m
          memory: 256Mi
    affinity:
      nodeAffinity:
        preferredDuringSchedulingIgnoredDuringExecution:
          - weight: 100
            preference:
              matchExpressions:
                - key: topology.kubernetes.io/region
                  operator: In
                  values:
                    - fr-rosenau
      # Spread the two controller pods across nodes.
      podAntiAffinity:
        preferredDuringSchedulingIgnoredDuringExecution:
          - weight: 100
            podAffinityTerm:
              labelSelector:
                matchLabels:
                  app.kubernetes.io/name: cloudflare-tunnel-ingress-controller
                  app.kubernetes.io/instance: cloudflare-tunnel-ingress-controller
              topologyKey: kubernetes.io/hostname
