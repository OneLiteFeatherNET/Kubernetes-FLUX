apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: cloudflare-tunnel-ingress-controller
  namespace: cloudflare-tunnel-ingress-controller
spec:
  chart:
    spec:
      version: ">=0.0.23"
  values:
    # Cloudflare credentials are sourced from the SOPS-managed Secret
    # generated by this kustomization (see kustomization.yaml secretGenerator).
    # Keys must match: account_id / tunnel_name / api_token.
    cloudflare:
      secretRef:
        name: cloudflare-tunnel-credentials
        accountIDKey: account_id
        tunnelNameKey: tunnel_name
        apiTokenKey: api_token
    priorityClassName: feather-platform
    resources:
      requests:
        cpu: 50m
        memory: 64Mi
      limits:
        cpu: 100m
        memory: 128Mi
    cloudflared:
      resources:
        requests:
          cpu: 50m
          memory: 64Mi
        limits:
          cpu: 200m
          memory: 256Mi
    affinity:
      nodeAffinity:
        preferredDuringSchedulingIgnoredDuringExecution:
          - weight: 100
            preference:
              matchExpressions:
                - key: topology.kubernetes.io/region
                  operator: In
                  values:
                    - fr-rosenau
