# Cluster priority tiers for workload hardening.
# Sit below the built-in system-cluster-critical (2000000000) /
# system-node-critical (2000001000), which stay reserved for kube-system and
# MariaDB Galera. Higher value preempts lower under resource pressure.
apiVersion: scheduling.k8s.io/v1
kind: PriorityClass
metadata:
  name: feather-platform
value: 1000000000
globalDefault: false
preemptionPolicy: PreemptLowerPriority
description: "Foundational platform: storage (Ceph), databases, ingress (Envoy), CA."
---
apiVersion: scheduling.k8s.io/v1
kind: PriorityClass
metadata:
  name: feather-high
value: 100000
globalDefault: false
preemptionPolicy: PreemptLowerPriority
description: "Important services: monitoring, container registry, redis, connection poolers."
---
apiVersion: scheduling.k8s.io/v1
kind: PriorityClass
metadata:
  name: feather-standard
value: 1000
globalDefault: false
preemptionPolicy: PreemptLowerPriority
description: "Standard applications (outline, leantime, reposilite, dependency-track, etc.)."
---
apiVersion: scheduling.k8s.io/v1
kind: PriorityClass
metadata:
  name: feather-low
value: -10
globalDefault: false
preemptionPolicy: PreemptLowerPriority
description: "Non-critical / best-effort apps (bluemap, node-red, uptime-kuma) — evicted first."
