# Cluster priority tiers for workload hardening (5 levels).
# All sit below the built-in system-cluster-critical (2000000000) /
# system-node-critical (2000001000), which stay reserved for kube-system.
# Higher value wins: under resource pressure the scheduler preempts and the
# kubelet evicts lower-priority pods first.
apiVersion: scheduling.k8s.io/v1
kind: PriorityClass
metadata:
  name: feather-critical
value: 1000000000
globalDefault: false
preemptionPolicy: PreemptLowerPriority
description: "Storage layer (Ceph OSD/mon/mgr) — underpins every PVC; eviction means data unavailability."
---
apiVersion: scheduling.k8s.io/v1
kind: PriorityClass
metadata:
  name: feather-platform
value: 900000000
globalDefault: false
preemptionPolicy: PreemptLowerPriority
description: "Stateful core: databases (Postgres, MariaDB/MaxScale), ingress (Envoy), CA (step-ca)."
---
apiVersion: scheduling.k8s.io/v1
kind: PriorityClass
metadata:
  name: feather-high
value: 100000
globalDefault: false
preemptionPolicy: PreemptLowerPriority
description: "Observability & shared services: monitoring, container registry (Harbor), Redis, connection poolers."
---
apiVersion: scheduling.k8s.io/v1
kind: PriorityClass
metadata:
  name: feather-standard
value: 1000
globalDefault: false
preemptionPolicy: PreemptLowerPriority
description: "Standard applications (outline, leantime, reposilite, dependency-track, shlink, otis)."
---
apiVersion: scheduling.k8s.io/v1
kind: PriorityClass
metadata:
  name: feather-low
value: -10
globalDefault: false
preemptionPolicy: PreemptLowerPriority
description: "Non-critical / best-effort apps (bluemap, node-red, uptime-kuma) — evicted first."
