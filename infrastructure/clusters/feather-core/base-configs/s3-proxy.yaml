apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: rgw-external-proxy
  namespace: rook-ceph-fr01
spec:
  parentRefs:
    - name: eg
      namespace: envoy
      sectionName: https
  hostnames:
    - s3.onelitefeather.net
    - '*.s3.onelitefeather.net'
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - name: rook-ceph-rgw-feather-s3
          port: 80
---
apiVersion: gateway.envoyproxy.io/v1alpha1
kind: SecurityPolicy
metadata:
  name: rgw-external-proxy-cors
  namespace: rook-ceph-fr01
spec:
  targetRefs:
    - group: gateway.networking.k8s.io
      kind: HTTPRoute
      name: rgw-external-proxy
  cors:
    allowOrigins:
      - "https://outline.onelitefeather.dev"
    allowMethods:
      - GET
      - PUT
      - POST
      - DELETE
      - OPTIONS
    allowHeaders:
      - Authorization
      - Content-Type
      - Origin
      - Accept
      - Range
    exposeHeaders:
      - ETag
      - Content-Length
      - Accept-Ranges
      - Content-Range
      - Content-Type
    allowCredentials: true
