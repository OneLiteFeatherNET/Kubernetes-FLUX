# Namespace
apiVersion: v1
kind: Namespace
metadata:
  name: storage-proxy
---
apiVersion: v1
kind: Endpoints
metadata:
  name: ceph-rgw-external
  namespace: storage-proxy
subsets:
  - addresses:
      - ip: 10.200.1.2
      - ip: 10.200.1.3
      - ip: 10.200.1.4
      - ip: 10.200.1.5
    ports:
      - port: 7480
---
apiVersion: discovery.k8s.io/v1
kind: EndpointSlice
metadata:
  name: ceph-rgw-external
  namespace: storage-proxy
  labels:
    kubernetes.io/service-name: ceph-rgw-external
ports:
  - name: http
    port: 7480
addressType: IPv4
endpoints:
  - addresses:
    - "10.200.1.2"
    - "10.200.1.3"
    - "10.200.1.4"
    - "10.200.1.5"
    conditions:
      ready: true
---
apiVersion: v1
kind: Service
metadata:
  name: ceph-rgw-external
  namespace: storage-proxy
spec:
  type: ClusterIP
  ports:
    - name: http
      port: 7480
      targetPort: 7480
  clusterIP: None
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: rgw-external-proxy
  namespace: storage-proxy
spec:
  parentRefs:
    - name: eg
      namespace: envoy
      sectionName: https
  hostnames:
    - s3.onelitefeather.net
    - '*.s3.onelitefeather.net'
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - name: ceph-rgw-external
          port: 7480
---
apiVersion: gateway.envoyproxy.io/v1alpha1
kind: SecurityPolicy
metadata:
  name: rgw-external-proxy-cors
  namespace: storage-proxy
spec:
  targetRefs:
    - group: gateway.networking.k8s.io
      kind: HTTPRoute
      name: rgw-external-proxy
  cors:
    allowOrigins:
      - "https://outline.onelitefeather.dev"
    allowMethods:
      - GET
      - PUT
      - POST
      - DELETE
      - OPTIONS
    allowHeaders:
      - Authorization
      - Content-Type
      - Origin
      - Accept
      - Range
    exposeHeaders:
      - ETag
      - Content-Length
      - Accept-Ranges
      - Content-Range
      - Content-Type
    allowCredentials: true
