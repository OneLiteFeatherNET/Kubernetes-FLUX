# Namespace
apiVersion: v1
kind: Namespace
metadata:
  name: storage-proxy
---
# ReferenceGrant: allows HTTPRoute in storage-proxy to use service in rook-ceph-fr01
apiVersion: gateway.networking.k8s.io/v1beta1
kind: ReferenceGrant
metadata:
  name: allow-s3-proxy
  namespace: rook-ceph-fr01
spec:
  from:
    - group: gateway.networking.k8s.io
      kind: HTTPRoute
      namespace: storage-proxy
  to:
    - group: ""
      kind: Service
      name: rook-ceph-rgw-feather-s3
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: rgw-external-proxy
  namespace: storage-proxy
spec:
  parentRefs:
    - name: eg
      namespace: envoy
      sectionName: https
  hostnames:
    - s3.onelitefeather.net
    - '*.s3.onelitefeather.net'
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - name: rook-ceph-rgw-feather-s3
          namespace: rook-ceph-fr01
          port: 80
---
# Internal path-style S3 endpoint on the Envoy gateway (step-ca TLS).
# s3.apps.onelite.feather is NOT in the CephObjectStore dnsNames, so RGW serves
# it path-style (s3.apps.onelite.feather/<bucket>/<key>). Reuses the existing
# allow-s3-proxy ReferenceGrant. Resolves via the *.apps.onelite.feather
# wildcard -> 10.200.90.1 (gateway LB). In-cluster clients must trust the
# step-ca root CA for TLS (or use the plain RGW service over HTTP).
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: rgw-internal
  namespace: storage-proxy
spec:
  parentRefs:
    - name: eg
      namespace: envoy
      sectionName: https
  hostnames:
    - s3.apps.onelite.feather
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - name: rook-ceph-rgw-feather-s3
          namespace: rook-ceph-fr01
          port: 80
---
apiVersion: gateway.envoyproxy.io/v1alpha1
kind: SecurityPolicy
metadata:
  name: rgw-external-proxy-cors
  namespace: storage-proxy
spec:
  targetRefs:
    - group: gateway.networking.k8s.io
      kind: HTTPRoute
      name: rgw-external-proxy
  cors:
    allowOrigins:
      - "https://outline.onelitefeather.dev"
    allowMethods:
      - GET
      - PUT
      - POST
      - DELETE
      - OPTIONS
    allowHeaders:
      - Authorization
      - Content-Type
      - Origin
      - Accept
      - Range
    exposeHeaders:
      - ETag
      - Content-Length
      - Accept-Ranges
      - Content-Range
      - Content-Type
    allowCredentials: true
