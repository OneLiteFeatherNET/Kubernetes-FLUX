apiVersion: v1
kind: Namespace
metadata:
  name: cloudflare-tunnel-ingress-controller
  labels:
    # The cloudflared connector Deployment is generated by the controller and
    # is not PodSecurity "restricted"-compliant (privileged caps, runAsRoot).
    # Pin the namespace to privileged so this is intentional and the admission
    # warning is silenced.
    pod-security.kubernetes.io/enforce: privileged
    pod-security.kubernetes.io/warn: privileged
    pod-security.kubernetes.io/audit: privileged
