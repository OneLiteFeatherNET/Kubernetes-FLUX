apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  # external-snapshotter v8.2.1 — VolumeSnapshot CRDs + cluster-wide
  # snapshot-controller. Matches the csi-snapshotter v8.2.1 sidecar shipped with
  # the Rook RBD/CephFS CSI driver. Exactly one snapshot-controller per cluster;
  # the CRDs are required or the CSI snapshotter sidecar fails to list
  # volumesnapshotcontents. Bump ref together with the Rook CSI sidecar version.
  - https://github.com/kubernetes-csi/external-snapshotter/client/config/crd?ref=v8.6.0
  - https://github.com/kubernetes-csi/external-snapshotter/deploy/kubernetes/snapshot-controller?ref=v8.6.0
