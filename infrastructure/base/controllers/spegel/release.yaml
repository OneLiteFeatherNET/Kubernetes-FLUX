apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: spegel
  namespace: kube-system
spec:
  chartRef:
    kind: OCIRepository
    name: spegel
    namespace: flux-system
  install:
    remediation:
      retries: 3
  interval: 1m0s
  timeout: 5m
  values:
    tolerations:
      - key: node-role.feather/storage
        operator: Equal
        value: "true"
        effect: NoSchedule
    spegel:
      containerdRegistryConfigPath: /etc/cri/conf.d/hosts
    # Metrics scraping (Alloy discovers ServiceMonitors cluster-wide) + dashboard
    # via the Grafana sidecar (same grafana_dashboard label as the Loki dashboards).
    serviceMonitor:
      enabled: true
      interval: 60s
    grafanaDashboard:
      enabled: true
      mode: Sidecar
      labels:
        grafana_dashboard: "1"