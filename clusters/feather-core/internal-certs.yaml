apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: internal-certs
  namespace: flux-system
spec:
  dependsOn:
    # step-issuer (StepClusterIssuer CRD/controller) is applied by the
    # `controllers` Kustomization; it in turn dependsOn base-controllers
    # (cert-manager), so ordering is cert-manager -> step-issuer -> here.
    - name: controllers
  interval: 1m0s
  retryInterval: 30s
  timeout: 10m0s
  sourceRef:
    kind: GitRepository
    name: flux-system
  path: ./infrastructure/clusters/feather-core/internal-certs
  prune: true
  # wait:false: internal *.apps.onelite.feather certs issue directly
  # via step-issuer/step-ca. Health-gating here must NOT block
  # anything - a not-yet-configured StepClusterIssuer only delays TLS
  # for those internal-only hosts.
  wait: false
