apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: base-sources
  namespace: flux-system
spec:
  interval: 1m0s
  retryInterval: 30s
  timeout: 1m0s
  sourceRef:
    kind: GitRepository
    name: flux-system
  path: ./infrastructure/clusters/feather-core/base-sources
  prune: true
  wait: false
  decryption:
    provider: sops
    secretRef:
      name: sops-gpg
