apiVersion: v1
kind: Service
metadata:
  name: source-controller-metrics
  namespace: flux-system
  labels:
    app.kubernetes.io/component: source-controller
    app.kubernetes.io/instance: flux-system
    app.kubernetes.io/part-of: flux
    monitoring: flux-metrics
spec:
  type: ClusterIP
  selector:
    app: source-controller
  ports:
    - name: http-metrics
      port: 8080
      protocol: TCP
      targetPort: http-prom
---
apiVersion: v1
kind: Service
metadata:
  name: helm-controller-metrics
  namespace: flux-system
  labels:
    app.kubernetes.io/component: helm-controller
    app.kubernetes.io/instance: flux-system
    app.kubernetes.io/part-of: flux
    monitoring: flux-metrics
spec:
  type: ClusterIP
  selector:
    app: helm-controller
  ports:
    - name: http-metrics
      port: 8080
      protocol: TCP
      targetPort: http-prom
---
apiVersion: v1
kind: Service
metadata:
  name: kustomize-controller-metrics
  namespace: flux-system
  labels:
    app.kubernetes.io/component: kustomize-controller
    app.kubernetes.io/instance: flux-system
    app.kubernetes.io/part-of: flux
    monitoring: flux-metrics
spec:
  type: ClusterIP
  selector:
    app: kustomize-controller
  ports:
    - name: http-metrics
